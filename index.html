laceholder-val=\"{{ false }}\">\n                  <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-top:6px\">Keep section names in [brackets] on their own line — e.g. [Verse 1], [Chorus], [Bridge] — that's the format Suno reads.<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ myShowSecList }}\" hint-placeholder-val=\"{{ false }}\">\n                <div onclick=\"{{ onMySectionEdit }}\" style=\"display:flex;flex-direction:column;gap:12px\">\n                  <sc-for list=\"{{ myWorkSections }}\" as=\"sec\" hint-placeholder-count=\"0\">\n                    <div data-my-sec-item=\"1\" style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:14px 16px\">\n                      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n                        <span style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)\">{{ sec.tag }}<\u002Fspan>\n                        <button type=\"button\" data-my-sec-edit=\"1\" style=\"appearance:none;border:0;background:transparent;cursor:pointer;color:var(--text-accent);font-size:var(--text-xs);font-weight:var(--weight-semibold);font-family:inherit;padding:2px 6px\">Edit<\u002Fbutton>\n                      <\u002Fdiv>\n                      <div style=\"font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-relaxed);white-space:pre-wrap;overflow-wrap:break-word\">{{ sec.text }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:14px\">Everything Suno needs: in <b>Custom<\u002Fb> mode, paste the copied lyrics (with their [bracketed] section tags) into the <b>Lyrics<\u002Fb> box, the Style text into <b>Style of Music<\u002Fb>, and the Title into <b>Song Title<\u002Fb>. Edits here save back to your Google Sheet. Tap <b>Create image<\u002Fb> to copy a ready-made YouTube-thumbnail prompt — this song's title, summary &amp; lyrics baked into the design brief — and open Gemini to generate the cover art.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n          <\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ============ Tab 6 · Settings ============ -->\n    <sc-if value=\"{{ showSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"Settings\">\n        <div class=\"ts-hero\" style=\"text-align:center;margin:12px auto 28px;max-width:560px\">\n          <h2 class=\"ts-hero-title\" style=\"font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin:0;color:var(--text-strong)\">Settings<\u002Fh2>\n          <p class=\"ts-hero-sub\" style=\"color:var(--text-secondary);font-size:var(--text-base);margin:10px 0 0;line-height:var(--leading-normal)\">Choose which AI writes and researches your songs, and add an access token if your Apps Script needs one.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:20px\">\n\n          <!-- Card 1 · AI Model -->\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,320px\">\n            <h3 style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);margin:0 0 12px;color:var(--text-strong)\">AI Model<\u002Fh3>\n            <div onclick=\"{{ onProviderSelect }}\" style=\"display:flex;flex-direction:column;border-top:var(--border-hairline) solid var(--border-subtle)\">\n              <sc-for list=\"{{ providerRows }}\" as=\"p\" hint-placeholder-count=\"5\">\n                <div data-provider-id=\"{{ p.id }}\" role=\"button\" tabindex=\"0\" style=\"display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:var(--border-hairline) solid var(--border-subtle);cursor:pointer\">\n                  <span style=\"width:20px;height:20px;flex:none;display:grid;place-items:center;color:var(--text-accent);opacity:{{ p.checkOpacity }}\">{{ checkIcon }}<\u002Fspan>\n                  <span style=\"flex:1;min-width:0;font-size:var(--text-base);color:{{ p.nameColor }};font-weight:{{ p.nameWeight }}\">{{ p.name }}<\u002Fspan>\n                  <sc-if value=\"{{ p.showBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                    <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Badge\" tone=\"{{ p.badgeTone }}\" hint-size=\"auto,24px\">{{ p.badgeLabel }}<\u002Fx-import>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin:12px 0 0;line-height:var(--leading-normal)\">Keys are stored in your Google Apps Script, never in this app.<\u002Fp>\n          <\u002Fx-import>\n\n          <!-- Card 2 · Access token -->\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,200px\">\n            <h3 style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);margin:0 0 12px;color:var(--text-strong)\">Access token<\u002Fh3>\n            <sc-if value=\"{{ showTokenRequiredNote }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:var(--warning-soft);border:var(--border-hairline) solid var(--amber-500);color:var(--amber-600);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-sm);line-height:var(--leading-normal);margin:0 0 12px\">Your endpoint requires an access token — enter it here to use the AI features.<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;gap:8px;align-items:center\">\n              <input type=\"password\" aria-label=\"Access token\" placeholder=\"Paste your AI_TOKEN…\" style=\"flex:1;min-width:0;box-sizing:border-box;padding:9px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n              <div style=\"display:contents\" onclick=\"{{ saveToken }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" size=\"sm\" hint-size=\"auto,36px\">Save<\u002Fx-import><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasTokenSavedMsg }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:var(--text-xs);color:var(--green-600);font-weight:var(--weight-semibold);margin:10px 0 0\">{{ tokenSavedMsg }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <p style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin:12px 0 0;line-height:var(--leading-normal)\">Only needed if you've set an AI_TOKEN in your Apps Script. Leave blank otherwise.<\u002Fp>\n          <\u002Fx-import>\n\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer class=\"ts-footer\" style=\"max-width:var(--content-max);margin:0 auto;padding:0 24px 40px;color:var(--text-tertiary);font-size:var(--text-xs);text-align:center;line-height:var(--leading-relaxed)\">Tune Studio · Song data is AI-generated — double-check credits before publishing anything.<\u002Ffooter>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text\u002Fx-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;playlistId&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;PL2OGLRh-7afJ3_8BuFR1N9QHIh2P_MYSU&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; },\n  &quot;aiModel&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;claude-haiku-4-5&quot;, &quot;claude-sonnet-4-5&quot;], &quot;default&quot;: &quot;claude-sonnet-4-5&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Behavior&quot; },\n  &quot;showSunoTab&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot; }\n}\">\nconst SHEETS_ENDPOINT = 'https:\u002F\u002Fscript.google.com\u002Fmacros\u002Fs\u002FAKfycbx3MR7gDoWDMDcaIjYU2vU_wGcgYcUYipixvKKCsT45fS6_Gxh0v-hpddZhCpCcl3IcdQ\u002Fexec';\n\n\u002F\u002F Single source of truth for the AI providers the backend supports. Every\n\u002F\u002F part of the UI (Settings picker, status badges, result captions) reads\n\u002F\u002F from this list so they can never drift apart.\nconst PROVIDERS = [\n  { id: 'claude',   name: 'Claude' },\n  { id: 'openai',   name: 'ChatGPT' },\n  { id: 'gemini',   name: 'Gemini' },\n  { id: 'grok',     name: 'Grok' },\n  { id: 'deepseek', name: 'DeepSeek' },\n];\nconst providerName = (id) => (PROVIDERS.find(p => p.id === id) || { name: 'Claude' }).name;\n\n\u002F\u002F Fixed system prompt for AI thumbnail art. The \"Create image\" button on a saved\n\u002F\u002F song copies this verbatim, with the song's title + summary + lyrics appended as\n\u002F\u002F the [Cover name] input, then opens Gemini so the user can paste and generate.\nconst THUMBNAIL_PROMPT = `You are a world-class visual AI designer specialized in creating high-performing YouTube thumbnails for music content.\n\nYour objective is to create emotionally powerful, visually consistent, and highly clickable thumbnails for song covers, optimized for a 30–50% clickthrough rate (CTR), especially on mobile feeds.\n\nYou will receive user input [Cover name] that contains:\n- A song title (which must appear as the only visible text in the image) = Cover name\n- One of the following:\n  - A brief description of the song's emotional background, OR\n  - The full lyrics of the song\n\n---\n\n🧠 YOUR TASK:\n1. If provided with a background description, analyze the emotional tone and any individuals, places, or situations mentioned.\n2. If provided with lyrics, extract:\n   - The dominant emotion\n   - Any implied setting, situation, or relationship\n   - Visual metaphors or imagery that suggest mood, lighting, weather, environment, or scene.\n3. Visually represent the song using a fitting scene based on its mood, theme, and imagery.\n4. Do not include background context, lyrics, or extra wording as text.\n5. The only text visible in the image should be the song title, stylized according to the fixed banner system.\n6. Adhere 100% to the design system outlined below.\n\n---\n\n🔒 FIXED THUMBNAIL DESIGN SYSTEM (Apply exactly):\n\n• 📐 Image Specs:\n  - 1280x720 pixels (16:9)\n  - Ultra-high resolution, hyper-detailed\n  - Format: JPEG or PNG\n\n• 🎭 Scene:\n  - Create a visually striking scene that strongly matches the tone, theme, and energy of the song title and any additional context provided by the user.\n  - Analyze the song title and description first, then decide the best composition, angle, background, and mood to visually represent the song in a compelling, family-friendly way.\n  - Replace the corny animated character with a fitting visual scene inspired by the song's emotional world.\n  - The scene can include environments, props, silhouettes, symbolic elements, or cinematic moments that communicate the feeling of the song.\n  - Prioritize imagery that feels instantly readable and emotionally strong at thumbnail size.\n  - Use a clean, bold composition with one clear focal point.\n  - Adapt lighting, background, depth, and framing dynamically based on the song (e.g. glowing city for nightlife songs, rainy street for heartbreak, open road for freedom, mountain campsite for adventure, empty room for loneliness, etc.).\n  - The overall image should feel cinematic, dramatic, and highly clickable rather than cartoonish or goofy.\n\n• 🖼️ Visual Style:\n  - Highly polished digital illustration or cinematic thumbnail art\n  - Not crude, childish, or intentionally comedic\n  - Rich detail, strong depth, and professional YouTube-thumbnail appeal\n  - Clear subject separation and visual hierarchy\n  - Avoid clutter; keep the composition focused and bold\n  - Use scene-driven storytelling rather than character-driven comedy\n\n• 💡 Lighting:\n  - High-contrast cinematic with rim lighting from both sides\n  - Neon glow with:\n    - Dominant color: Electric Blue (#00FFFF)\n    - Accent color: Magenta (#FF00FF)\n\n• 🌇 Background:\n  - Golden hour city rooftop with sun flare, glowing skyline, soft bokeh blur\n  - If the song's mood clearly calls for a different environment, replace the rooftop with a more fitting cinematic scene while preserving the same premium thumbnail quality and lighting intensity\n\n• 🏷️ Top Banner Text (Only Text in Image):\n  - Banner: 150px tall, solid black (#000000) with gradient to dark gray (#1a1a1a)\n  - Text: SONG TITLE ONLY, all caps\n    - Font: Bebas Neue or Impact\n    - Color: Bold white with black outline\n    - Alignment: Centered, scaled to fill banner height\n\n• ✨ Additional Effects:\n  - Lens flare (top corners, subtle)\n  - Atmospheric bokeh\u002Fdust particles\n  - Soft vignette for visual focus\n  - Sharpened focal area \u002F main scene subject\n\n---\n\n📌 DO NOT:\n- Include lyrics or background description in the image\n- Deviate from the banner design\n- Use a corny animated character as the main subject\n- Use goofy, childish, or crude cartoon imagery\n- Add any text other than the song title\n- Create abstract imagery with no clear scene or focal point`;\n\nconst GEMINI_URL = 'https:\u002F\u002Fgemini.google.com\u002Fapp';\n\n\u002F\u002F The songwriter persona + craft rules + the exact Suno-readable output contract.\n\u002F\u002F Prepended to every Songwriter request so the model behaves like a world-class\n\u002F\u002F hit writer and returns something the app's parser and Suno both understand.\nconst SONGWRITER_DIRECTIVE = `You are a world-class, award-winning hit songwriter and topliner — the kind who writes #1 singles that millions stream on repeat. Your job is to write ONE complete, original song that could genuinely top the charts.\n\nWHAT MAKES IT WORLD-CLASS (do all of this):\n- A single strong concept and a title that sells it.\n- An instantly memorable, repeatable CHORUS that is the emotional payoff — the part people sing back after one listen.\n- Verses that build tension and set the chorus up with contrast; a pre-chorus that lifts into it.\n- Concrete, sensory, specific images and fresh turns of phrase — never clichés, filler, or vague greeting-card lines.\n- Singable phrasing: consistent meter and syllable counts within each section, natural word stress, and a clear, satisfying rhyme scheme.\n- A real arc across the song: setup → lift → payoff → a turn in the bridge → final send-off.\n- Contemporary, conversational, human language. Every line earns its place.\n\nSUNO-READY OUTPUT CONTRACT (follow EXACTLY — this is non-negotiable):\n- Output ONLY the song. No preamble, no commentary, no explanations, no markdown, no code fences.\n- Line 1 must be: TITLE: <the song title>\n- Line 2 must be: STYLE: <8–12 comma-separated descriptors that go straight into Suno's Style box — genre + subgenre, mood, tempo\u002Fenergy, lead vocal type, key instrumentation, and production aesthetic>. Keep them tag-like, not full sentences.\n- Then the lyrics. Put every section's tag in square brackets on its own line, using Suno's structure tags: [Intro], [Verse 1], [Pre-Chorus], [Chorus], [Verse 2], [Bridge], [Outro]. Include the sections the song needs; a hit almost always repeats the [Chorus].\n- EVERY section tag must also state HOW it is performed, written INSIDE the same brackets after a colon — Suno reads this to voice the section. Format: [Section: vocal cue]. Examples: [Verse 1: male warm tenor, smooth melodic, conversational], [Pre-Chorus: male vocal, raspy edge, building], [Chorus: male & female harmonies, anthemic belt, soaring], [Verse 2: male bright nasal fast rap, crisp diction, aggressive], [Bridge: female breathy alto, half-time, whispered, intimate], [Outro: layered gang vocals, chant]. Do NOT put the vocal cue on a separate line or in its own brackets — it must be inside the section tag; keep it tag-like (comma-separated descriptors, not a sentence) and under ~90 characters.\n- Specify, in each tag, the singer (male \u002F female \u002F duet \u002F choir \u002F gang vocals) and the delivery painted as concrete SOUND so Suno can reproduce the voice, not just a one-word label: its register (deep baritone, warm tenor, bright alto or high soprano), timbre and texture (raspy, nasal, breathy, gravelly, smooth or gritty), diction and accent feel (crisp enunciated, slurred, drawled or laid-back), cadence and phrasing (melodic, belted, falsetto, whispered, spoken, rap, fast rap, triplet flow, behind-the-beat or punchy front-of-beat), and energy (intimate, building, aggressive or anthemic), choosing the few descriptors that most define the voice— all consistent with the lead vocal type on the STYLE line.\n- Write the chorus lyrics out in full every time it recurs — never write \"repeat chorus\" or similar (repeat the [Chorus: ...] tag with its vocal cue each time).\n- Keep the whole lyric tight enough for a ~2–3 minute Suno track: favor impact and repetition over length.`;\n\nclass Component extends DCLogic {\n  state = {\n    tab: 0,\n    query: '',\n    searching: false,\n    searchError: '',\n    showFallback: false,\n    fallbackQuery: '',\n    song: null,\n    ytInput: '',\n    ytId: null,\n    swInput: '',\n    swLoading: false,\n    swError: '',\n    swSong: null,\n    editIdx: null,\n    swSaving: false,\n    swSaveMsg: '',\n    swPrompt: '',\n    swRefining: false,   \u002F\u002F regenerating a fresh version or applying change-notes to the current draft\n    swFramework: null,   \u002F\u002F { title, artist, text } — a searched song's structure\u002Fmelody\u002Fstyle folded into the Songwriter\n    micOn: false,\n    searchMicOn: false,\n    copyLabel: 'Copy for Suno',\n    styleCopyLabel: 'Copy',\n    mySongs: null,\n    myLoading: false,\n    myError: '',\n    mySel: null,\n    myWork: null,\n    myEditIdx: null,\n    myDirty: false,\n    mySaving: false,\n    myDeleting: false,\n    myMsg: '',\n    myCopyLabel: 'Copy for Suno',\n    myStyleCopyLabel: 'Copy',\n    myImageLabel: 'Create image',\n    \u002F\u002F ---- Settings: AI provider, access token, live status ----\n    provider: 'claude',\n    accessToken: '',\n    providerStatus: null,   \u002F\u002F { providers: {id:bool}, tokenRequired: bool } once the status call lands\n    statusLoading: false,\n    tokenSavedMsg: '',\n    resultProvider: null,   \u002F\u002F provider that produced the current Songwriter draft\n    searchProvider: null,   \u002F\u002F provider that produced the current My-search result\n    swNeedsSettings: false, \u002F\u002F AI error that a Settings visit can fix (missing key \u002F bad token)\n    searchNeedsSettings: false,\n  };\n\n  componentDidMount() {\n    let saved = null;\n    try { saved = localStorage.getItem('tuneStudio.ytId2'); } catch (e) {}\n    \u002F\u002F Persisted Settings: validate the provider against the registry, fall back to Claude.\n    let provider = 'claude';\n    try {\n      const p = localStorage.getItem('tuneStudio.provider');\n      if (p && PROVIDERS.some((x) => x.id === p)) provider = p;\n    } catch (e) {}\n    let token = '';\n    try { token = localStorage.getItem('tuneStudio.token') || ''; } catch (e) {}\n    this.setState({ ytId: saved, provider: provider, accessToken: token }); \u002F\u002F re-render also picks up the loaded DS bundle for icons\n  }\n\n  componentDidUpdate() {\n    \u002F\u002F The songwriter fields are uncontrolled (per-keystroke state updates would\n    \u002F\u002F remount them and drop focus), so after every re-render their DOM values\n    \u002F\u002F are re-filled from state. Handlers harvest DOM values before any setState,\n    \u002F\u002F so state is always current here. Focused elements are never touched.\n    this.componentDidUpdateMySongs();\n    const st = this.state;\n    const s = st.swSong;\n    if (!s) return;\n    const put = (sel, val) => {\n      const el = document.querySelector(sel);\n      if (el && document.activeElement !== el && el.value !== val) el.value = val;\n    };\n    put('input[aria-label=\"Song title\"]', s.title);\n    put('input[aria-label=\"Suno style\"]', s.style);\n    if (st.editIdx !== null) {\n      const want = st.editIdx === -2\n        ? this.sectionsToText(s.sections)\n        : (s.sections[st.editIdx] ? s.sections[st.editIdx].text : '');\n      put('textarea[aria-label=\"Edit lyrics\"]', want);\n    }\n  }\n\n  componentDidUpdateMySongs() {\n    const st = this.state;\n    if (!st.myWork) return;\n    const put = (sel, val) => {\n      const el = document.querySelector(sel);\n      if (el && document.activeElement !== el && el.value !== val) el.value = val;\n    };\n    put('input[aria-label=\"Edit song title\"]', st.myWork.title);\n    put('input[aria-label=\"Edit song style\"]', st.myWork.style);\n    if (st.myEditIdx !== null) {\n      const want = st.myEditIdx === -2\n        ? this.sectionsToText(st.myWork.sections)\n        : (st.myWork.sections[st.myEditIdx] ? st.myWork.sections[st.myEditIdx].text : '');\n      put('textarea[aria-label=\"Edit song lyrics\"]', want);\n    }\n  }\n\n  icon(name) {\n    const DS = window.AdsitDesignSystem_ab046a;\n    return DS ? React.createElement(DS.Icon, { name, size: 16 }) : null;\n  }\n\n  \u002F\u002F The DS icon set has no picture glyph, so draw a small framed-image icon inline\n  \u002F\u002F for the \"Create image\" button.\n  imageIcon() {\n  when it isn't.\n  handleAppLink(e, androidPackage) {\n    const ua = navigator.userAgent || '';\n    const isAndroid = \u002Fandroid\u002Fi.test(ua);\n    if (!isAndroid) return;\n    let webUrl = (e && e.currentTarget && e.currentTarget.href) || '';\n    if (!webUrl && e && e.target && e.target.closest) {\n      const a = e.target.closest('a');\n      if (a) webUrl = a.href;\n    }\n    if (!webUrl) return;\n    e.preventDefault();\n    const noProto = webUrl.replace(\u002F^https?:\\\u002F\\\u002F\u002F, '');\n    window.location.href = 'intent:\u002F\u002F' + noProto + '#Intent;scheme=https;package=' +\n      androidPackage + ';S.browser_fallback_url=' + encodeURIComponent(webUrl) + ';end';\n  }\n\n  openSuno = (e) => this.handleAppLink(e, 'com.suno.android');\n  openYouTube = (e) => this.handleAppLink(e, 'com.google.android.youtube');\n\n  loadStatus = async () => {\n    if (this.state.statusLoading) return;\n    this.setState({ statusLoading: true });\n    try {\n      const out = await this.apiRequest('status', {});\n      this.setState({ statusLoading: false, providerStatus: { providers: out.providers || {}, tokenRequired: !!out.tokenRequired } });\n    } catch (err) {\n      \u002F\u002F Status is optional — leave providerStatus null so the picker renders without badges.\n      this.setState({ statusLoading: false });\n    }\n  };\n\n  \u002F\u002F Delegated handler for the provider list (per-item functions can't be\n  \u002F\u002F bound inside the runtime's list scope) — mirrors onSongSelect \u002F onSectionEdit.\n  onProviderSelect = (e) => {\n    const row = e.target && e.target.closest ? e.target.closest('[data-provider-id]') : null;\n    if (!row) return;\n    const id = row.getAttribute('data-provider-id');\n    if (!id || !PROVIDERS.some((p) => p.id === id)) return;\n    try { localStorage.setItem('tuneStudio.provider', id); } catch (e2) {}\n    this.setState({ provider: id });\n  };\n\n  saveToken = () => {\n    const el = document.querySelector('inp
