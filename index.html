  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\n  --gray-200: #dce1ec;   /* hairlines */\n  --gray-300: #c4cbdb;\n  --gray-400: #9aa3b7;\n  --gray-500: #737d92;   /* placeholder / tertiary */\n  --gray-600: #545d70;   /* secondary text */\n  --gray-700: #3b4457;\n  --gray-800: #262d3c;\n  --gray-900: #171d2b;   /* ink */\n  --black:    #0d111b;\n\n  /* --- Interactive blue (product accent) --- */\n  --blue-50:  #eef3ff;\n  --blue-100: #d9e5ff;\n  --blue-300: #85a9ff;\n  --blue-500: #2f6bff;\n  --blue-600: #1f57e6;\n  --blue-700: #1745bf;\n\n  /* --- Brand teal (logo) --- */\n  --teal-50:  #e2f5f1;\n  --teal-100: #bfe9e1;\n  --teal-300: #5ec6ba;\n  --teal-500: #0a8f82;   /* the logo teal */\n  --teal-600: #077a6e;\n  --teal-700: #055c53;\n\n  /* --- Green (success / positive) --- */\n  --green-50:  #e4f6ef;\n  --green-500: #12a58c;\n  --green-600: #0b8874;\n\n  /* --- Red / coral (record, live, destructive) --- */\n  --red-50:   #ffeef0;\n  --red-100:  #ffd7db;\n  --red-500:  #ef4e5b;\n  --red-600:  #d93b48;\n\n  /* --- Amber (warning) --- */\n  --amber-50:  #fff5e1;\n  --amber-500: #f5a623;\n  --amber-600: #d98a10;\n\n  /* ======================================================================\n     Semantic aliases — reference these in components.\n     ====================================================================== */\n\n  /* Text */\n  --text-strong:    #131824;\n  --text-primary:   var(--gray-900);\n  --text-secondary: var(--gray-600);\n  --text-tertiary:  var(--gray-500);\n  --text-on-accent: var(--white);\n  --text-accent:    var(--blue-600);\n  --text-brand:     var(--teal-600);\n\n  /* Surfaces */\n  --surface-page:        var(--gray-50);\n  --surface-card:        var(--white);\n  --surface-sunken:      var(--gray-100);\n  --surface-hover:       var(--gray-100);\n  --surface-active:      var(--gray-150);\n  --surface-accent-soft: var(--blue-50);\n  --surface-brand-soft:  var(--teal-50);\n\n  /* Borders (colors) */\n  --border-subtle:  var(--gray-150);\n  --border-default: var(--gray-200);\n  --border-strong:  var(--gray-300);\n  --border-accent:  var(--blue-500);\n\n  /* Accent (interactive) */\n  --accent:        var(--blue-500);\n  --accent-hover:  var(--blue-600);\n  --accent-press:  var(--blue-700);\n  --accent-soft:   var(--blue-50);\n\n  /* Brand (identity moments) */\n  --brand:        var(--teal-500);\n  --brand-hover:  var(--teal-600);\n  --brand-soft:   var(--teal-50);\n\n  /* Status */\n  --success:      var(--green-500);\n  --success-soft: var(--green-50);\n  --danger:       var(--red-500);\n  --danger-soft:  var(--red-50);\n  --warning:      var(--amber-500);\n  --warning-soft: var(--amber-50);\n  --record:       var(--red-500);\n  --record-soft:  var(--red-50);\n\n  /* Focus / glow rings (box-shadow values) */\n  --focus-ring:  0 0 0 3px rgba(47, 107, 255, 0.30);   /* @kind shadow */\n  --ring-accent: 0 0 0 4px rgba(47, 107, 255, 0.22);   /* @kind shadow */\n  --ring-brand:  0 0 0 4px rgba(10, 143, 130, 0.22);   /* @kind shadow */\n  --ring-danger: 0 0 0 4px rgba(239, 78, 91, 0.22);    /* @kind shadow */\n}\n</style>\n  <style>/* ==========================================================================\n   Revolutionary. AI — Typography tokens\n   Display: Poppins  (rounded geometric — friendly, confident headlines)\n   Sans:    Figtree  (humanist sans — UI + body)\n   Mono:    JetBrains Mono\n   ========================================================================== */\n:root {\n  --font-display: 'Poppins', ui-sans-serif, system-ui, -apple-system, sans-serif;   /* @kind font */\n  --font-sans:    'Figtree', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;  /* @kind font */\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;       /* @kind font */\n\n  /* Type scale (px) — compact-friendly for extension UIs */\n  --text-2xs: 11px;\n  --text-xs:  12px;\n  --text-sm:  13px;\n  --text-base:15px;   /* default UI text */\n  --text-md:  17px;\n  --text-lg:  20px;\n  --text-xl:  24px;\n  --text-2xl: 30px ;\n  src: url(\"c70ebe07-b0da-4149-87ce-9ffcef2197c9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ==========================================================================\n   Revolutionary. AI — Color tokens\n   Brand teal is taken from the logo mark. Interactive blue + coral record\n   state + cool grayscale neutrals are taken from the Randy product UI.\n   ========================================================================== */\n:root {\n  /* --- Neutrals (cool blue-gray, Apple-like) --- */\n  --white:    #ffffff;\n  --gray-25:  #fbfcfe;\n  --gray-50:  #f4f6fb;   /* app canvas */\n  --gray-100: #eef1f8;\n  --gray-150: #e6eaf3;\n  --gray-200: #dce1ec;   /* hairlines */\n  --gray-300: #c4cbdb;\n  --gray-400: #9aa3b7;\n  --gray-500: #737d92;   /* placeholder / tertiary */\n  --gray-600: #545d70;   /* secondary text */\n  --gray-700: #3b4457;\n  --gray-800: #262d3c;\n  --gray-900: #171d2b;   /* ink */\n  --black:    #0d111b;\n\n  /* --- Interactive blue (product accent) --- */\n  --blue-50:  #eef3ff;\n  --blue-100: #d9e5ff;\n  --blue-300: #85a9ff;\n  --blue-500: #2f6bff;\n  --blue-600: #1f57e6;\n  --blue-700: #1745bf;\n\n  /* --- Brand teal (logo) --- */\n  --teal-50:  #e2f5f1;\n  --teal-100: #bfe9e1;\n  --teal-300: #5ec6ba;\n  --teal-500: #0a8f82;   /* the logo teal */\n  --teal-600: #077a6e;\n  --teal-700: #055c53;\n\n  /* --- Green (success / positive) --- */\n  --green-50:  #e4f6ef;\n  --green-500: #12a58c;\n  --green-600: #0b8874;\n\n  /* --- Red / coral (record, live, destructive) --- */\n  --red-50:   #ffeef0;\n  --red-100:  #ffd7db;\n  --red-500:  #ef4e5b;\n  --red-600:  #d93b48;\n\n  /* --- Amber (warning) --- */\n  --amber-50:  #fff5e1;\n  --amber-500: #f5a623;\n  --amber-600: #d98a10;\n\n  /* ======================================================================\n     Semantic aliases — reference these in components.\n     ====================================================================== */\n\n  /* Text */\n  --text-strong:    #131824;\n  --text-primary:   var(--gray-900);\n  --text-secondary: var(--gray-600);\n  --text-tertiary:  var(--gray-500);\n  --text-on-accent: var(--white);\n  --text-accent:    var(--blue-600);\n  --text-brand:     var(--teal-600);\n\n  /* Surfaces */\n  --surface-page:        var(--gray-50);\n  --surface-card:        var(--white);\n  --surface-sunken:      var(--gray-100);\n  --surface-hover:       var(--gray-100);\n  --surface-active:      var(--gray-150);\n  --surface-accent-soft: var(--blue-50);\n  --surface-brand-soft:  var(--teal-50);\n\n  /* Borders (colors) */\n  --border-subtle:  var(--gray-150);\n  --border-default: var(--gray-200);\n  --border-strong:  var(--gray-300);\n  --border-accent:  var(--blue-500);\n\n  /* Accent (interactive) */\n  --accent:        var(--blue-500);\n  --accent-hover:  var(--blue-600);\n  --accent-press:  var(--blue-700);\n  --accent-soft:   var(--blue-50);\n\n  /* Brand (identity moments) */\n  --brand:        var(--teal-500);\n  --brand-hover:  var(--teal-600);\n  --brand-soft:   var(--teal-50);\n\n  /* Status */\n  --success:      var(--green-500);\n  --success-soft: var(--green-50);\n  --danger:       var(--red-500);\n  --danger-soft:  var(--red-50);\n  --warning:      var(--amber-500);\n  --warning-soft: var(--amber-50);\n  --record:       var(--red-500);\n  --record-soft:  var(--red-50);\n\n  /* Focus / glow rings (box-shadow values) */\n  --focus-ring:  0 0 0 3px rgba(47, 107, 255, 0.30);   /* @kind shadow */\n  --ring-accent: 0 0 0 4px rgba(47, 107, 255, 0.22);   /* @kind shadow */\n  --ring-brand:  0 0 0 4px rgba(10, 143, 130, 0.22);   /* @kind shadow */\n  --ring-danger: 0 0 0 4px rgba(239, 78, 91, 0.22);    /* @kind shadow */\n}\n\n/* ==========================================================================\n   Revolutionary. AI — Typography tokens\n   Display: Poppins  (rounded geometric — friendly, confident headlines)\n   Sans:    Figtree  (humanist sans — UI + body)\n   Mono:    JetBrains Mono\n   ========================================================================== */\n:root {\n  --font-display: 'Poppins', ui-sans-serif, system-ui, -apple-system, sans-serif;   /* @kind font */\n  --font-sans:    'Figtree', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;  /* @kind font */\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;       /* @kind font */\n\n  /* Type scale (px) — compact-friendly for extension UIs */\n  --text-2xs: 11px;\n  --text-xs:  12px;\n  --text-sm:  13px;\n  --text-base:15px;   /* default UI text */\n  --text-md:  17px;\n  --text-lg:  20px;\n  --text-xl:  24px;\n  --text-2xl: 30px;\n  --text-3xl: 40px;   /* hero headline */\n  --text-4xl: 52px;\n\n  /* Weights */\n  --weight-regular:  400;   /* @kind font */\n  --weight-medium:   500;   /* @kind font */\n  --weight-semibold: 600;   /* @kind font */\n  --weight-bold:     700;   /* @kind font */\n\n  /* Line heights */\n  --leading-tight:   1.1;   /* @kind font */\n  --leading-snug:    1.28;  /* @kind font */\n  --leading-normal:  1.5;   /* @kind font */\n  --leading-relaxed: 1.6;   /* @kind font */\n\n  /* Letter spacing */\n  --tracking-tight: -0.02em; /* @kind font */\n  --tracking-snug:  -0.01em; /* @kind font */\n  --tracking-caps:   0.08em; /* @kind font */\n}\n\n/* ==========================================================================\n   Revolutionary. AI — Spacing, radius & layout tokens (4px base grid)\n   ========================================================================== */\n:root {\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-7:   32px;\n  --space-8:   40px;\n  --space-9:   48px;\n  --space-10:  64px;\n  --space-12:  80px;\n\n  --pad-card:  20px;   /* default card / row padding */\n\n  /* Border widths */\n  --border-hairline: 1px;\n  --border-thick:    2px;\n\n  /* Radii */\n  --radius-xs:   6px;\n  --radius-sm:   8px;\n  --radius-md:   12px;   /* inputs, buttons, small cards */\n  --radius-lg:   16px;   /* cards, rows */\n  --radius-xl:   20px;   /* popup shell, modals */\n  --radius-2xl:  28px;\n  --radius-pill: 999px;  /* toggles, chips, composer, mic */\n\n  /* Product widths */\n  --popup-width: 360px;   /* Chrome / Edge extension popup */\n  --content-max: 1120px;  /* dashboard / marketing content */\n\n  /* Control heights */\n  --control-sm: 32px;\n  --control-md: 40px;\n  --control-lg: 48px;\n}\n\n/* ==========================================================================\n   Revolutionary. AI — Shadow, blur & motion tokens\n   Soft, cool, low-contrast shadows (Apple / Slack feel). Quick, gentle motion.\n   ========================================================================== */\n:root {\n  /* Shadows — cool blue-gray, soft, never harsh */\n  --shadow-xs:    0 1px 2px rgba(23, 29, 43, 0.06);\n  --shadow-sm:    0 2px 6px rgba(23, 29, 43, 0.07);\n  --shadow-md:    0 6px 18px rgba(23, 29, 43, 0.09);\n  --shadow-lg:    0 16px 40px rgba(23, 29, 43, 0.14);\n  --shadow-xl:    0 28px 70px rgba(23, 29, 43, 0.20);\n  --shadow-popup: 0 24px 64px rgba(23, 29, 43, 0.24);   /* floating extension popup */\n\n  /* Frosted-glass overlay (used sparingly on floating bars) */\n  --blur-panel: saturate(180%) blur(20px);   /* @kind other */\n\n  /* Motion — quick, gentle ease, no aggressive bounce */\n  --ease-standard: cubic-bezier(0.22, 1, 0.36, 1);   /* @kind other */\n  --ease-out:      cubic-bezier(0.16, 1, 0.30, 1);   /* @kind other */\n  --ease-spring:   cubic-bezier(0.34, 1.4, 0.64, 1); /* @kind other */\n  --duration-fast: 120ms;   /* @kind other */\n  --duration-base: 200ms;   /* @kind other */\n  --duration-slow: 320ms;   /* @kind other */\n}\n\n</style>\n  <script src=\"a60a00aa-2b05-4a8a-a6d2-a783d9c593be\"><\/script>\n  <style>\n    html, body { margin: 0; padding: 0; background: var(--surface-page); -webkit-text-size-adjust: 100%; }\n    @keyframes ts-spin { to { transform: rotate(360deg); } }\n    @keyframes ts-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }\n    /* Keep typed/dictated text clear of the floating mic button. */\n    textarea[aria-label=\"Describe your song\"] { padding-right: 54px; }\n    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }\n\n    /* ================================================================\n       Mobile layer — phones (iPhone Safari / Chrome) and small tablets.\n       The desktop markup is styled inline, so every rule here carries\n       !important and lives behind a max-width media query: desktop is\n       untouched, small screens get a native-app treatment.\n       ================================================================ */\n    @media (max-width: 720px) {\n      * { -webkit-tap-highlight-color: transparent; }\n      html, body { overflow-x: hidden; }\n\n      /* --- Edit Video: the preview + its player stay pinned under the header\n             while the styling controls scroll, like a phone video editor. --- */\n      .ev-preview-sticky {\n        position: sticky !important;\n        top: calc(env(safe-area-inset-top) + 52px) !important;\n        z-index: 30 !important;\n        background: var(--surface-card) !important;\n        box-shadow: 0 12px 22px -14px rgba(15, 26, 42, 0.45) !important;\n      }\n\n      /* --- Header: compact brand bar. The blur is dropped because a\n             backdrop-filter ancestor would trap the fixed dock below. --- */\n      .ts-header {\n        backdrop-filter: none !important;\n        -webkit-backdrop-filter: none !important;\n        background: rgba(251, 252, 254, 0.97) !important;\n        padding-top: env(safe-area-inset-top) !important;\n      }\n      .ts-header-bar { padding: 10px 16px !important; gap: 10px !important; }\n      .ts-tag :underline\">Official lyrics on Genius</a>\n                <a href=\"{{ youtubeUrl }}\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ openYouTube }}\" style=\"color:var(--text-accent);font-size:var(--text-sm);font-weight:var(--weight-semibold);text-decoration:none\" style-hover=\"text-decoration:underline\">Listen on YouTube</a>\n              </div>\n              <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:16px\">Full lyrics are licensed material, so instead of reprinting them this app embeds the publisher's own lyrics page below the song details.</div>\n            </x-import>\n\n            <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,360px\">\n              <h3 style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);margin:0 0 12px;color:var(--text-strong)\">Melody, notes &amp; credits</h3>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px\">\n                <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"0\">\n                  <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Badge\" tone=\"neutral\" hint-size=\"auto,24px\">{{ chip.label }} · {{ chip.value }}</x-import>\n                </sc-for>\n              </div>\n              <sc-if value=\"{{ hasChords }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:var(--surface-sunken);border-radius:var(--radius-md);padding:12px 14px;font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-primary);margin-bottom:14px;overflow-wrap:break-word\">{{ chords }}</div>\n              </sc-if>\n              <p style=\"font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-relaxed);margin:0 0 16px\">{{ melodyNotes }}</p>\n              <div style=\"border-top:var(--border-hairline) solid var(--border-subtle)\">\n                <sc-for list=\"{{ details }}\" as=\"row\" hint-placeholder-count=\"0\">\n                  <div style=\"display:grid;grid-template-columns:110px 1fr;gap:12px;padding:9px 0;border-bottom:var(--border-hairline) solid var(--border-subtle);font-size:var(--text-sm)\">\n                    <span style=\"color:var(--text-tertiary)\">{{ row.k }}</span>\n                    <span style=\"color:var(--text-primary);font-weight:var(--weight-medium)\">{{ row.v }}</span>\n                  </div>\n                </sc-for>\n              </div>\n            </x-import>\n\n          </div>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;background:var(--surface-accent-soft);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);padding:16px 20px;margin-top:20px\">\n            <div style=\"flex:1;min-width:240px\">\n              <div style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-strong)\">Use this as your songwriting framework</div>\n              <div style=\"font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:2px\">Copy this song's structure, melody &amp; style into the Songwriter — then just add your own story and let the AI write an original hit.</div>\n            </div>\n            <div style=\"display:contents\" onclick=\"{{ useAsTemplate }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" leading-icon=\"{{ copyIcon }}\" hint-size=\"auto,40px\">Copy to Songwriter</x-import></div>\n          </div>\n\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,560px\">\n            <h3 style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);margin:0 0 4px;color:var(--text-strong)\">Full lyrics</h3>\n            <p style=\"font-size:var(--text-sm);color:var(--text-tertiary);margin:0 0 12px\">{{ songTitle }} — {{ songArtist }} · embedded from AZLyrics</p>\n            <iframe class=\"ts-lyrics-frame\" src=\"{{ azLyricsUrl }}\" title=\"Full lyrics\" referrerpolicy=\"no-referrer\" sandbox=\"allow-scripts allow-same-origin allow-popups\" style=\"width:100%;height:520px;border:0;border-radius:var(--radius-lg);background:var(--surface-card);display:block\"></iframe>\n            <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:16px\">The lyrics above are served directly from <a href=\"{{ azLyricsUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--text-accent);font-weight:var(--weight-semibold);text-decoration:none\" style-hover=\"text-decoration:underline\">AZLyrics' page for this song</a> — not copied into the app. If the panel stays blank or shows \"not found\", their address for this song differs from the usual pattern — use the Genius link above instead.</div>\n          </x-import>\n        </sc-if>\n\n        <sc-if value=\"{{ showSearchEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onTryChip }}\" style=\"display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:8px;max-width:640px;margin:16px auto 0\">\n            <span style=\"font-size:var(--text-sm);color:var(--text-tertiary)\">Try:</span>\n            <button type=\"button\" data-try-q=\"Bohemian Rhapsody, Queen\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-default);background:var(--surface-card);border-radius:var(--radius-pill);padding:8px 14px;font-family:inherit;font-size:var(--text-sm);color:var(--text-primary);cursor:pointer;box-shadow:var(--shadow-xs)\" style-hover=\"background:var(--surface-hover)\">Bohemian Rhapsody</button>\n            <button type=\"button\" data-try-q=\"Jolene, Dolly Parton\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-default);background:var(--surface-card);border-radius:var(--radius-pill);padding:8px 14px;font-family:inherit;font-size:var(--text-sm);color:var(--text-primary);cursor:pointer;box-shadow:var(--shadow-xs)\" style-hover=\"background:var(--surface-hover)\">Jolene</button>\n            <button type=\"button\" data-try-q=\"Blinding Lights, The Weeknd\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-default);background:var(--surface-card);border-radius:var(--radius-pill);padding:8px 14px;font-family:inherit;font-size:var(--text-sm);color:var(--text-primary);cursor:pointer;box-shadow:var(--shadow-xs)\" style-hover=\"background:var(--surface-hover)\">Blinding Lights</button>\n          </div>\n          <div style=\"max-width:760px;margin:48px auto 0\">\n            <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);text-align:center;margin-bottom:14px\">How Tune Studio works</div>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px\">\n              <div style=\"background:var(--surface-card);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);padding:18px\">\n                <div style=\"width:28px;height:28px;border-radius:var(--radius-pill);background:var(--surface-accent-soft);color:var(--accent);display:grid;place-items:center;font-size:var(--text-sm);font-weight:var(--weight-bold);margin-bottom:10px\">1</div>\n                <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">Find a song you love</div>\n                <div style=\"font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:4px\">Search any track to see its structure, key, chords and style — you're here.</div>\n              </div>\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ goTab2 }}\" style=\"background:var(--surface-card);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);padding:18px;cursor:pointer\" style-hover=\"box-shadow:var(--shadow-sm)\">\n                <div style=\"width:28px;height:28px;border-radius:var(--radius-pill);background:var(--surface-accent-soft);color:var(--accent);display:grid;place-items:center;font-size:var(--text-sm);font-weight:var(--weight-bold);margin-bottom:10px\">2</div>\n                <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">Write your own</div>\n                <div style=\"font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:4px\">Describe your idea — the AI drafts original, Suno-ready lyrics.</div>\n                <div style=\"font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--text-accent);margin-top:8px\">Open Songwriter →</div>\n              </div>\n              <sc-if value=\"{{ sunoEnabled }}\" hint-placeholder-val=\"{{ true }}\">\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ goTab3 }}\" style=\"background:var(--surface-card);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);padding:18px;cursor:pointer\" style-hover=\"box-shadow:var(--shadow-sm)\">\n                <div style=\"width:28px;height:28px;border-radius:var(--radius-pill);background:var(--surface-accent-soft);color:var(--accent);display:grid;place-items:center;font-size:var(--text-sm);font-weight:var(--weight-bold);margin-bottom:10px\">3</div>\n                <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">Turn it into music</div>\n                <div style=\"font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:4px\">Copy your lyrics into Suno and generate the real track.</div>\n                <div style=\"font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--text-accent);margin-top:8px\">Open Make music →</div>\n              </div>\n              </sc-if>\n            </div>\n          </div>\n        </sc-if>\n\n        <div class=\"ts-az-row\" style=\"display:flex;justify-content:center;max-width:640px;margin:32px auto 0\">\n          <a class=\"ts-az-btn\" href=\"https://www.azlyrics.com\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;height:40px;padding:0 18px;box-sizing:border-box;background:var(--surface-card);border:var(--border-hairline) solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-xs);color:var(--text-primary);font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--weight-semibold);text-decoration:none;white-space:nowrap\" style-hover=\"background:var(--surface-hover)\">Browse AZLyrics&nbsp;<span aria-hidden=\"true\" style=\"color:var(--text-tertiary)\">↗</span></a>\n        </div>\n      </section>\n    </sc-if>\n\n    <!-- ============ Tab 2 · Playlist ============ -->\n    <sc-if value=\"{{ showYoutube }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"YouTube playlist\">\n        <div class=\"ts-hero\" style=\"text-align:center;margin:12px auto 28px;max-width:560px\">\n          <h2 class=\"ts-hero-title\" style=\"font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin:0;color:var(--text-strong)\">Your playlist, right here</h2>\n          <p class=\"ts-hero-sub\" style=\"color:var(--text-secondary);font-size:var(--text-base);margin:10px 0 0;line-height:var(--leading-normal)\">Paste a YouTube playlist link once — it stays embedded below, even after you reload.</p>\n        </div>\n        <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,560px\">\n          <div class=\"ts-yt-row\" style=\"display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-start\">\n            <div style=\"flex:1;min-width:240px\" onkeydown=\"{{ onYtKey }}\">\n              <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Input\" placeholder=\"Paste your YouTube playlist link or ID…\" aria-label=\"YouTube playlist link\" hint-size=\"100%,40px\"></x-import>\n            </div>\n            <div style=\"display:contents\" onclick=\"{{ loadPlaylist }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" hint-size=\"auto,40px\">Load playlist</x-import></div>\n          </div>\n          <div style=\"display:flex;margin-bottom:16px\">\n            <a class=\"ts-open-btn\" href=\"{{ ytOpenUrl }}\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ openYouTube }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;height:44px;padding:0 20px;box-sizing:border-box;background:var(--surface-card);border:var(--border-hairline) solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-xs);color:var(--text-primary);font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--weight-semibold);text-decoration:none;white-space:nowrap\" style-hover=\"background:var(--surface-hover)\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><rect x=\"2.5\" y=\"5\" width=\"19\" height=\"14\" rx=\"4\"></rect><path d=\"M10 9l5 3-5 3V9z\" fill=\"currentColor\" stroke=\"none\"></path></svg>Open in YouTube app<span aria-hidden=\"true\" style=\"opacity:0.7\">↗</span></a>\n          </div>\n          <iframe src=\"{{ ytSrc }}\" title=\"YouTube playlist\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture\" allowfullscreen=\"{{ true }}\" referrerpolicy=\"strict-origin-when-cross-origin\" style=\"width:100%;aspect-ratio:16/9;border:0;border-radius:var(--radius-lg);background:var(--gray-900);display:block\"></iframe>\n          <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:16px\">If the player shows a configuration error, YouTube is refusing to embed in this context — <a href=\"{{ ytOpenUrl }}\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ openYouTube }}\" style=\"color:var(--text-accent);font-weight:var(--weight-semibold);text-decoration:none\" style-hover=\"text-decoration:underline\">open the playlist on YouTube</a> instead.</div>\n        </x-import>\n      </section>\n    </sc-if>\n\n    <!-- ============ Tab 3 · Songwriter ============ -->\n    <sc-if value=\"{{ showSongwriter }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"Songwriter\">\n        <div class=\"ts-hero\" style=\"text-align:center;margin:12px auto 28px;max-width:560px\">\n          <h2 class=\"ts-hero-title\" style=\"font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin:0;color:var(--text-strong)\">Write something new</h2>\n          <p class=\"ts-hero-sub\" style=\"color:var(--text-secondary);font-size:var(--text-base);margin:10px 0 0;line-height:var(--leading-normal)\">{{ swHeroSub }}</p>\n        </div>\n        <div style=\"max-width:760px;margin:0 auto\">\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,240px\">\n            <sc-if value=\"{{ hasSwFramework }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:var(--surface-accent-soft);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px\">\n                  <div>\n                    <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)\">Framework applied</div>\n                    <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong);margin-top:2px\">{{ swFrameworkTitle }}</div>\n                  </div>\n                  <button type=\"button\" onclick=\"{{ clearFramework }}\" style=\"appearance:none;border:0;background:transparent;cursor:pointer;color:var(--text-accent);font-size:var(--text-xs);font-weight:var(--weight-semibold);font-family:inherit;padding:2px 6px;flex:none\">Remove</button>\n                </div>\n                <div style=\"font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-relaxed);white-space:pre-wrap;overflow-wrap:break-word;max-height:220px;overflow:auto\">{{ swFrameworkText }}</div>\n              </div>\n            </sc-if>\n            <div style=\"position:relative\">\n              <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Textarea\" rows=\"5\" placeholder=\"{{ swPlaceholder }}\" aria-label=\"Describe your song\" hint-size=\"100%,120px\"></x-import>\n              <div style=\"display:contents\" onclick=\"{{ toggleDictation }}\">\n                <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.MicButton\" type=\"button\" size=\"sm\" state=\"{{ micState }}\" aria-label=\"{{ micLabel }}\" title=\"{{ micLabel }}\" style=\"position:absolute;top:10px;right:10px\" hint-size=\"36px,36px\"></x-import>\n              </div>\n            </div>\n            <sc-if value=\"{{ micListening }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:10px\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.ListeningBar\" label=\"{{ micStatus }}\" hint-size=\"100%,38px\"></x-import></div>\n            </sc-if>\n            <div style=\"display:flex;justify-content:flex-end;margin-top:14px\">\n              <div style=\"display:contents\" onclick=\"{{ writeSong }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" leading-icon=\"{{ sparklesIcon }}\" disabled=\"{{ swLoading }}\" hint-size=\"auto,40px\">Write my song</x-import></div>\n            </div>\n\n            <sc-if value=\"{{ swLoading }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;padding:36px 20px;color:var(--text-secondary);font-size:var(--text-sm)\">\n                <div style=\"width:22px;height:22px;border-radius:50%;border:2.5px solid var(--blue-100);border-top-color:var(--accent);animation:ts-spin 0.8s linear infinite;margin:0 auto 12px\"></div>\n                <span>Writing your song…</span>\n              </div>\n            </sc-if>\n\n            <sc-if value=\"{{ hasSwError }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:16px;background:var(--danger-soft);border:var(--border-hairline) solid var(--red-100);color:var(--red-600);border-radius:var(--radius-md);padding:14px 16px;font-size:var(--text-sm);line-height:var(--leading-normal)\">\n                <span>{{ swError }}</span>\n                <sc-if value=\"{{ swNeedsSettings }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:10px\">\n                    <span onclick=\"{{ openSettings }}\" role=\"button\" tabindex=\"0\" style=\"color:var(--text-accent);font-weight:var(--weight-semibold);text-decoration:none;cursor:pointer\" style-hover=\"text-decoration:underline\">Open Settings</span>\n                  </div>\n                </sc-if>\n              </div>\n            </sc-if>\n\n            <sc-if value=\"{{ hasSwSong }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:20px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px\">\n                  <span style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary)\">{{ swDraftCaption }}</span>\n                  <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center\">\n                    <div style=\"display:contents\" onclick=\"{{ copyForSuno }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" size=\"sm\" leading-icon=\"{{ copyIcon }}\" hint-size=\"auto,32px\">{{ copyLabel }}</x-import></div>\n                    <div style=\"display:contents\" onclick=\"{{ saveDraft }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" disabled=\"{{ swSaving }}\" hint-size=\"auto,32px\">{{ saveLabel }}</x-import></div>\n                    <sc-if value=\"{{ swShowList }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:contents\" onclick=\"{{ editAll }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Edit all</x-import></div>\n                    </sc-if>\n                    <sc-if value=\"{{ swEditing }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:contents\" onclick=\"{{ doneEdit }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" size=\"sm\" hint-size=\"auto,32px\">Done editing</x-import></div>\n                    </sc-if>\n                  </div>\n                </div>\n\n                <sc-if value=\"{{ hasSwSaveMsg }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin:0 0 10px\">{{ swSaveMsg }}</div>\n                </sc-if>\n\n                <div class=\"ts-field-grid\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:14px\">\n                  <div>\n                    <label style=\"display:block;font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Title — goes in Suno's Song Title box</label>\n                    <input aria-label=\"Song title\" style=\"width:100%;box-sizing:border-box;padding:9px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n                  </div>\n                  <div>\n                    <label style=\"display:block;font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Style of Music — goes in Suno's Style box</label>\n                    <div style=\"display:flex;gap:8px;align-items:center\">\n                      <input aria-label=\"Suno style\" style=\"flex:1;min-width:0;box-sizing:border-box;padding:9px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n                      <div style=\"display:contents\" onclick=\"{{ copyStyle }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">{{ styleCopyLabel }}</x-import></div>\n                    </div>\n                  </div>\n                </div>\n\n                <sc-if value=\"{{ swEditing }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent);margin:0 0 6px\">{{ swEditLabel }}</div>\n                  <textarea aria-label=\"Edit lyrics\" rows=\"14\" style=\"width:100%;box-sizing:border-box;padding:14px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);line-height:var(--leading-relaxed);color:var(--text-primary);background:var(--surface-card);font-family:inherit;resize:vertical\"></textarea>\n                  <sc-if value=\"{{ swEditingAll }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-top:6px\">Keep section names in [brackets] on their own line — e.g. [Verse 1], [Chorus], [Bridge] — that's the format Suno reads.</div>\n                  </sc-if>\n                </sc-if>\n\n                <sc-if value=\"{{ swShowList }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div onclick=\"{{ onSectionEdit }}\" style=\"display:flex;flex-direction:column;gap:12px\">\n                    <sc-for list=\"{{ swSections }}\" as=\"sec\" hint-placeholder-count=\"0\">\n                      <div data-sec-item=\"1\" style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:14px 16px\">\n                        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n                          <span style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)\">{{ sec.tag }}</span>\n                          <button type=\"button\" data-sec-edit=\"1\" style=\"appearance:none;border:0;background:transparent;cursor:pointer;color:var(--text-accent);font-size:var(--text-xs);font-weight:var(--weight-semibold);font-family:inherit;padding:2px 6px\">Edit</button>\n                        </div>\n                        <div style=\"font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-relaxed);white-space:pre-wrap;overflow-wrap:break-word\">{{ sec.text }}</div>\n                      </div>\n                    </sc-for>\n                  </div>\n                  <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:14px\"><div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent);margin-bottom:6px\">Next — turn it into a real track</div><ol style=\"margin:0;padding-left:18px;display:flex;flex-direction:column;gap:4px\"><li><b>Copy for Suno</b> grabs the lyrics above.</li><li>In Suno, choose <b>Custom</b> mode and paste them into <b>Lyrics</b>.</li><li>Copy the <b>Style</b> and <b>Title</b> into their boxes, then hit Create.</li></ol><div style=\"margin-top:10px\"><a href=\"https://suno.com/create\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ openSuno }}\" style=\"color:var(--text-accent);font-size:var(--text-sm);font-weight:var(--weight-semibold);text-decoration:none\" style-hover=\"text-decoration:underline\">Open Suno →</a></div></div>\n                </sc-if>\n\n                <!-- Refine: revise this draft with change-notes, or spin a fresh new version -->\n                <div style=\"margin-top:18px;border-top:var(--border-hairline) solid var(--border-subtle);padding-top:16px\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px\">\n                    <span style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary)\">Make changes</span>\n                    <div style=\"display:contents\" onclick=\"{{ regenerateSong }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" leading-icon=\"{{ refreshIcon }}\" disabled=\"{{ swRefining }}\" hint-size=\"auto,32px\">New version</x-import></div>\n                  </div>\n                  <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:8px\">Ask the AI to rework this song — or hit <b>New version</b> for a fresh take on the same idea.</div>\n                  <textarea aria-label=\"Change notes\" rows=\"3\" placeholder=\"{{ swRefinePlaceholder }}\" style=\"width:100%;box-sizing:border-box;padding:12px 14px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);line-height:var(--leading-relaxed);color:var(--text-primary);background:var(--surface-card);font-family:inherit;resize:vertical\"></textarea>\n                  <div style=\"display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:10px\">\n                    <sc-if value=\"{{ swRefining }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"display:inline-flex;align-items:center;gap:8px;color:var(--text-secondary);font-size:var(--text-sm)\"><span style=\"width:16px;height:16px;border-radius:50%;border:2px solid var(--blue-100);border-top-color:var(--accent);animation:ts-spin 0.8s linear infinite\"></span>Reworking your song…</span>\n                    </sc-if>\n                    <div style=\"display:contents\" onclick=\"{{ refineSong }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" size=\"sm\" leading-icon=\"{{ sparklesIcon }}\" disabled=\"{{ swRefining }}\" hint-size=\"auto,32px\">Rewrite with changes</x-import></div>\n                  </div>\n                </div>\n              </div>\n            </sc-if>\n          </x-import>\n        </div>\n      </section>\n    </sc-if>\n\n    <!-- ============ Tab 4 · Suno ============ -->\n    <sc-if value=\"{{ showSuno }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"Suno\">\n        <div class=\"ts-hero\" style=\"text-align:center;margin:12px auto 28px;max-width:560px\">\n          <h2 class=\"ts-hero-title\" style=\"font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin:0;color:var(--text-strong)\">Turn lyrics into music</h2>\n          <p class=\"ts-hero-sub\" style=\"color:var(--text-secondary);font-size:var(--text-base);margin:10px 0 0;line-height:var(--leading-normal)\">Browse Suno's Discover feed, or open it full-screen to generate a track from your Songwriter lyrics.</p>\n        </div>\n        <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,640px\">\n          <div style=\"display:flex;justify-content:flex-end;margin-bottom:16px\">\n            <a class=\"ts-open-btn\" href=\"https://suno.com/create\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ openSuno }}\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;height:44px;padding:0 20px;box-sizing:border-box;background:var(--accent);border:0;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);color:var(--text-on-accent);font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--weight-semibold);text-decoration:none;white-space:nowrap\" style-hover=\"background:var(--accent-hover)\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3l1.9 4.8L19 9.5l-5.1 1.7L12 16l-1.9-4.8L5 9.5l5.1-1.7L12 3z\"></path></svg>Open in Suno app<span aria-hidden=\"true\" style=\"opacity:0.85\">↗</span></a>\n          </div>\n          <iframe class=\"ts-suno-frame\" src=\"https://suno.com/discover?homeNav=1\" title=\"Suno Discover\" style=\"width:100%;height:70vh;min-height:520px;border:0;border-radius:var(--radius-lg);background:var(--surface-card);display:block\"></iframe>\n          <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:16px\"><b>Open in Suno app</b> opens the Suno app on your phone (or suno.com in a new tab) — paste your copied lyrics there and hit Create.</div>\n        </x-import>\n      </section>\n    </sc-if>\n\n    <!-- ============ Tab 5 · My songs ============ -->\n    <sc-if value=\"{{ showMySongs }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"My songs\">\n        <div class=\"ts-hero\" style=\"text-align:center;margin:12px auto 28px;max-width:560px\">\n          <h2 class=\"ts-hero-title\" style=\"font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin:0;color:var(--text-strong)\">Your saved songs</h2>\n          <p class=\"ts-hero-sub\" style=\"color:var(--text-secondary);font-size:var(--text-base);margin:10px 0 0;line-height:var(--leading-normal)\">Every song you've saved from the Songwriter — open one to view, copy, edit, or turn into a track.</p>\n        </div>\n        <div style=\"max-width:760px;margin:0 auto\">\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,320px\">\n\n            <sc-if value=\"{{ myLoading }}\" hint-placeholder-val=\"{{ false }}\">\n              <div aria-label=\"Loading your songs\" style=\"display:flex;flex-direction:column;gap:10px\">\n                <div style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:16px;animation:ts-pulse 1.4s var(--ease-standard) infinite\">\n                  <div style=\"width:45%;height:14px;border-radius:6px;background:var(--border-subtle)\"></div>\n                  <div style=\"width:70%;height:10px;border-radius:6px;background:var(--border-subtle);margin-top:9px\"></div>\n                </div>\n                <div style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:16px;animation:ts-pulse 1.4s var(--ease-standard) 0.15s infinite\">\n                  <div style=\"width:60%;height:14px;border-radius:6px;background:var(--border-subtle)\"></div>\n                  <div style=\"width:40%;height:10px;border-radius:6px;background:var(--border-subtle);margin-top:9px\"></div>\n                </div>\n                <div style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:16px;animation:ts-pulse 1.4s var(--ease-standard) 0.3s infinite\">\n                  <div style=\"width:35%;height:14px;border-radius:6px;background:var(--border-subtle)\"></div>\n                  <div style=\"width:55%;height:10px;border-radius:6px;background:var(--border-subtle);margin-top:9px\"></div>\n                </div>\n              </div>\n            </sc-if>\n\n            <sc-if value=\"{{ hasMyError }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:var(--danger-soft);border:var(--border-hairline) solid var(--red-100);color:var(--red-600);border-radius:var(--radius-md);padding:14px 16px;font-size:var(--text-sm);line-height:var(--leading-normal);margin-bottom:14px\">{{ myError }}</div>\n              <div style=\"display:contents\" onclick=\"{{ refreshMySongs }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Try again</x-import></div>\n            </sc-if>\n\n            <sc-if value=\"{{ hasMyMsg }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin:0 0 12px\">{{ myMsg }}</div>\n            </sc-if>\n\n            <sc-if value=\"{{ myEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:var(--text-sm);line-height:var(--leading-relaxed)\"><div style=\"margin-bottom:16px\">No saved songs yet — write one and hit <b>Save song</b>. It'll show up here.</div><div style=\"display:inline-flex\" onclick=\"{{ goTab2 }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" hint-size=\"auto,40px\">Write a song</x-import></div></div>\n            </sc-if>\n\n            <sc-if value=\"{{ myShowList }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap\">\n                <span style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong);flex:none\">{{ myCountLabel }}</span>\n                <div style=\"flex:1;min-width:8px\"></div>\n                <input oninput=\"{{ onMyFilter }}\" aria-label=\"Filter your songs\" placeholder=\"Filter by title or style…\" style=\"width:210px;max-width:52vw;box-sizing:border-box;padding:8px 14px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-pill);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-sunken);font-family:inherit\">\n                <div style=\"display:contents\" onclick=\"{{ refreshMySongs }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Refresh</x-import></div>\n              </div>\n              <div onclick=\"{{ onSongSelect }}\" style=\"display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ myItems }}\" as=\"song\" hint-placeholder-count=\"0\">\n                  <div data-my-item=\"{{ song.idx }}\" role=\"button\" tabindex=\"0\" aria-label=\"Open {{ song.title }}\" style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:background var(--duration-fast) var(--ease-standard)\" style-hover=\"background:var(--surface-hover)\">\n                    <div style=\"min-width:0;flex:1\">\n                      <div style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ song.title }}</div>\n                      <sc-if value=\"{{ song.hasStyle }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ song.stylePreview }}</div>\n                      </sc-if>\n                      <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);margin-top:5px\">{{ song.meta }}</div>\n                    </div>\n                    <span aria-hidden=\"true\" style=\"color:var(--text-tertiary);flex:none;display:grid;place-items:center\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 18l6-6-6-6\"></path></svg></span>\n                  </div>\n                </sc-for>\n              </div>\n              <div data-my-nomatch=\"1\" style=\"display:none;text-align:center;padding:24px 16px;color:var(--text-tertiary);font-size:var(--text-sm)\">No songs match — clear the filter to see them all.</div>\n            </sc-if>\n\n            <sc-if value=\"{{ myShowDetail }}\" hint-placeholder-val=\"{{ false }}\">\n              <!-- Nav row: back on the left, destructive delete kept apart on the right so it's never mis-tapped alongside everyday actions. -->\n              <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px\">\n                <div style=\"display:contents\" onclick=\"{{ backToList }}\">< a.Button\" hint-size=\"100%,44px\">Done editing</x-import></div>\n                  </sc-if>\n                  <div style=\"display:contents\" onclick=\"{{ saveMyChanges }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" disabled=\"{{ mySaving }}\" hint-size=\"100%,44px\">{{ mySaveLabel }}</x-import></div>\n                  <div style=\"display:contents\" onclick=\"{{ createMyImage }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" leading-icon=\"{{ imageIcon }}\" hint-size=\"100%,44px\">{{ myImageLabel }}</x-import></div>\n                </div>\n              </div>\n\n              <sc-if value=\"{{ myEditingSec }}\" hint-placeholder-val=\"{{ false }}\">\n                <sc-if value=\"{{ myEditingOneSec }}\" hint-placeholder-val=\"{{ false }}\">\n                  <label style=\"display:block;font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Section description — the [bracketed] cue Suno reads for this section</label>\n                  <input aria-label=\"Edit section description\" style=\"width:100%;box-sizing:border-box;padding:9px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-card);font-family:inherit;margin-bottom:12px\">\n                  <label style=\"display:block;font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Lyrics for this section</label>\n                </sc-if>\n                <sc-if value=\"{{ myEditingAllFlag }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent);margin:0 0 6px\">{{ myEditLabel }}</div>\n                </sc-if>\n                <textarea aria-label=\"Edit song lyrics\" rows=\"14\" style=\"width:100%;box-sizing:border-box;padding:14px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);line-height:var(--leading-relaxed);color:var(--text-primary);background:var(--surface-card);font-family:inherit;resize:vertical\"></textarea>\n                <sc-if value=\"{{ myEditingAllFlag }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-top:6px\">Keep section names in [brackets] on their own line — e.g. [Verse 1], [Chorus], [Bridge] — that's the format Suno reads.</div>\n                </sc-if>\n                <sc-if value=\"{{ myEditingOneSec }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:16px;border-top:var(--border-hairline) solid var(--border-subtle);padding-top:14px\">\n                    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px\">\n                      <span style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary)\">Improve this section with AI</span>\n                      <div style=\"display:contents\" onclick=\"{{ refreshMySection }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" leading-icon=\"{{ refreshIcon }}\" disabled=\"{{ myRefiningSec }}\" hint-size=\"auto,32px\">Refresh section</x-import></div>\n                    </div>\n                    <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:8px\">Tell the AI what to improve about just this section — or leave it blank and hit <b>Refresh section</b> for a stronger rewrite of these lines.</div>\n                    <textarea aria-label=\"Section change notes\" rows=\"2\" placeholder=\"{{ mySecNotesPlaceholder }}\" style=\"width:100%;box-sizing:border-box;padding:12px y-sec-item=\"1\" role=\"button\" tabindex=\"0\" style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:background var(--duration-fast) var(--ease-standard)\" style-hover=\"background:var(--surface-hover)\">\n                      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n                        <span style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)\">{{ sec.tag }}</span>\n                        <button type=\"button\" data-my-sec-edit=\"1\" style=\"appearance:none;border:0;background:transparent;cursor:pointer;color:var(--text-accent);font-size:var(--text-xs);font-weight:var(--weight-semibold);font-family:inherit;padding:2px 6px\">Edit</button>\n                      </div>\n                      <div style=\"font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-relaxed);white-space:pre-wrap;overflow-wrap:break-word\">{{ sec.text }}</div>\n                    </div>\n                  </sc-for>\n                </div>\n                <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:14px\"><div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent);margin-bottom:6px\">Turn it into a real track</div><ol style=\"margin:0;padding-left:18px;display:flex;flex-direction:column;gap:4px\"><li><b>Copy for Suno</b> grabs the lyrics above.</li><li>In Suno, choose <b>Custom</b> mode and paste them into <b>Lyrics</b>.</li><li>Copy the <b>Style</b> and <b>Title</b> into their boxes, then hit Create.</li></ol><div style=\"margin-top:8px\"><b>Create image</b> copies a ready-made cover-art prompt and opens Gemini — just paste it there to generate. Edits you make here are saved with the song.</div><div style=\"margin-top:10px\"><a href=\"https://suno.com/create\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ openSuno }}\" style=\"color:var(--text-accent);font-size:var(--text-sm);font-weight:var(--weight-semibold);text-decoration:none\" style-hover=\"text-decoration:underline\">Open Suno →</a></div></div>\n              </sc-if>\n            </sc-if>\n\n          </x-import>\n        </div>\n      </section>\n    </sc-if>\n\n    <!-- ============ Tab 6 · Settings ============ -->\n    <sc-if value=\"{{ showSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"Settings\">\n        <div class=\"ts-hero\" style=\"text-align:center;margin:12px auto 28px;max-width:560px\">\n          <h2 class=\"ts-hero-title\" style=\"font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin:0;color:var(--text-strong)\">Settings</h2>\n          <p class=\"ts-hero-sub\" style=\"color:var(--text-secondary);font-size:var(--text-base);margin:10px 0 0;line-height:var(--leading-normal)\">Pick which AI writes and researches your songs.</p>\n        </div>\n        <div style=\"max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:20px\">\n\n          <!-- Card 1 · AI Model -->\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,320px\">\n            <h3 style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);margin:0 0 12px;color:var(--text-strong)\">AI Model</h3>\n            <div onclick=\"{{ onProviderSelect }}\" style=\"display:flex;flex-direction:column;border-top:var(--border-hairline) solid var(--border-subtle)\">\n              <sc-for list=\"{{ providerRows }}\" as=\"p\" hint-placeholder-count=\"5\">\n                <div data-provider-id=\"{{ p.id }}\" role=\"button\" tabindex=\"0\" style=\"display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:var(--border-hairline) solid var(--border-subtle);cursor:pointer\">\n                  <span style=\"width:20px;height:20px;flex:none;display:grid;place-items:center;color:var(--text-accent);opacity:{{ p.checkOpacity }}\">{{ checkIcon }}</span>\n                  <span style=\"flex:1;min-width:0;font-size:var(--text-base);color:{{ p.nameColor }};font-weight:{{ p.nameWeight }}\">{{ p.name }}</span>\n                  <sc-if value=\"{{ p.showBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                    <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Badge\" tone=\"{{ p.badgeTone }}\" hint-size=\"auto,24px\">{{ p.badgeLabel }}</x-import>\n                  </sc-if>\n                </div>\n              </sc-for>\n            </div>\n            <p style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin:12px 0 0;line-height:var(--leading-normal)\">Your AI keys stay in your own backend — this app never stores them.</p>\n          </x-import>\n\n          <!-- Card 2 · Access token -->\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,200px\">\n            <h3 style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);margin:0 0 12px;color:var(--text-strong)\">Access token</h3>\n            <sc-if value=\"{{ showTokenRequiredNote }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:var(--warning-soft);border:var(--border-hairline) solid var(--amber-500);color:var(--amber-600);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-sm);line-height:var(--leading-normal);margin:0 0 12px\">An access token is required — paste it here to unlock the AI features.</div>\n            </sc-if>\n            <div style=\"display:flex;gap:8px;align-items:center\">\n              <input type=\"password\" aria-label=\"Access token\" placeholder=\"Paste your AI_TOKEN…\" style=\"flex:1;min-width:0;box-sizing:border-box;padding:9px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n              <div style=\"display:contents\" onclick=\"{{ saveToken }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" size=\"sm\" hint-size=\"auto,36px\">Save</x-import></div>\n            </div>\n            <sc-if value=\"{{ hasTokenSavedMsg }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:var(--text-xs);color:var(--green-600);font-weight:var(--weight-semibold);margin:10px 0 0\">{{ tokenSavedMsg }}</div>\n            </sc-if>\n            <p style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin:12px 0 0;line-height:var(--leading-normal)\">Only needed if your setup uses an access token — leave blank otherwise.</p>\n          </x-import>\n\n        </div>\n      </section>\n    </sc-if>\n\n    <!-- ============ Tab 7 · Edit Video ============ -->\n    <sc-if value=\"{{ showEditVideo }}\" hint-placeholder-val=\"{{ false }}\">\n      <section data-screen-label=\"Edit Video\">\n        <div class=\"ts-hero\" style=\"text-align:center;margin:12px auto 28px;max-width:560px\">\n          <h2 class=\"ts-hero-title\" style=\"font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:var(--leading-tight);margin:0;color:var(--text-strong)\">Edit your video</h2>\n          <p class=\"ts-hero-sub\" style=\"color:var(--text-secondary);font-size:var(--text-base);margin:10px 0 0;line-height:var(--leading-normal)\">Load a song and its lyrics — every lyric line becomes a caption in your video.</p>\n        </div>\n        <div style=\"max-width:760px;margin:0 auto\">\n          <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,320px\">\n\n            <sc-if value=\"{{ hasEvError }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:var(--danger-soft);border:var(--border-hairline) solid var(--red-100);color:var(--red-600);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-sm);line-height:var(--leading-normal);margin:0 0 14px\">{{ evError }}</div>\n            </sc-if>\n\n            <!-- Step 1 · two ways to start -->\n            <sc-if value=\"{{ evShowStart }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px\">\n                <div onclick=\"{{ evChooseFromLibrary }}\" role=\"button\" tabindex=\"0\" aria-label=\"Choose from My songs\" style=\"background:var(--surface-sunken);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);padding:20px 18px;cursor:pointer;text-align:center;transition:background var(--duration-fast) var(--ease-standard)\" style-hover=\"background:var(--surface-hover)\">\n                  <div style=\"width:44px;height:44px;border-radius:var(--radius-md);background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;margin:0 auto 10px\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M9 18V5l12-2v13\"></path><circle cx=\"6\" cy=\"18\" r=\"3\"></circle><circle cx=\"18\" cy=\"16\" r=\"3\"></circle></svg></div>\n                  <div style=\"font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-strong)\">Choose from My songs</div>\n                  <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin-top:5px;line-height:var(--leading-normal)\">Pick a saved song — its title and lyrics load automatically.</div>\n                </div>\n                <label role=\"button\" tabindex=\"0\" aria-label=\"Upload audio\" style=\"background:var(--surface-sunken);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);padding:20px 18px;cursor:pointer;text-align:center;display:block;transition:background var(--duration-fast) var(--ease-standard)\" style-hover=\"background:var(--surface-hover)\">\n                  <input type=\"file\" accept=\".mp3,.wav,audio/mpeg,audio/wav,audio/x-wav\" aria-label=\"Upload audio file\" onchange=\"{{ onEvFile }}\" style=\"display:none\">\n                  <div style=\"width:44px;height:44px;border-radius:var(--radius-md);background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;margin:0 auto 10px\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"></path><path d=\"M17 8l-5-5-5 5\"></path><path d=\"M12 3v12\"></path></svg></div>\n                  <div style=\"font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-strong)\">Upload audio</div>\n                  <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin-top:5px;line-height:var(--leading-normal)\">An MP3 or WAV from your computer — it stays in your browser. You'll paste the lyrics next.</div>\n                </label>\n              </div>\n\n              <sc-if value=\"{{ evPicking }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:16px;border-top:var(--border-hairline) solid var(--border-subtle);padding-top:14px\">\n                  <sc-if value=\"{{ evLoading }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"text-align:center;padding:24px 16px;color:var(--text-secondary);font-size:var(--text-sm)\"><div style=\"width:22px;height:22px;border-radius:50%;border:2.5px solid var(--blue-100);border-top-color:var(--accent);animation:ts-spin 0.8s linear infinite;margin:0 auto 12px\"></div>Loading your songs…</div>\n                  </sc-if>\n                  <sc-if value=\"{{ evPickEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"text-align:center;padding:24px 16px;color:var(--text-secondary);font-size:var(--text-sm);line-height:var(--leading-relaxed)\">No saved songs yet — write one in the Songwriter and hit <b>Save song</b>, or start from an uploaded audio file instead.</div>\n                  </sc-if>\n                  <div onclick=\"{{ onEvSongSelect }}\" style=\"display:flex;flex-direction:column;gap:10px\">\n                    <sc-for list=\"{{ evPickItems }}\" as=\"song\" hint-placeholder-count=\"0\">\n                      <div data-ev-item=\"{{ song.idx }}\" role=\"button\" tabindex=\"0\" aria-label=\"Load {{ song.title }}\" style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:background var(--duration-fast) var(--ease-standard)\" style-hover=\"background:var(--surface-hover)\">\n                        <div style=\"min-width:0;flex:1\">\n                          <div style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ song.title }}</div>\n                          <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);margin-top:5px\">{{ song.meta }}</div>\n                        </div>\n                        <span aria-hidden=\"true\" style=\"color:var(--text-tertiary);flex:none;display:g
