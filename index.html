rid;place-items:center\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 18l6-6-6-6\"></path></svg></span>\n                      </div>\n                    </sc-for>\n                  </div>\n                </div>\n              </sc-if>\n            </sc-if>\n\n            <!-- Loaded (paste or ready): title, player, then the step's content -->\n            <sc-if value=\"{{ evShowLoaded }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin:0 0 14px\">\n                <div style=\"min-width:0;flex:1\">\n                  <div style=\"font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ evTitle }}</div>\n                  <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);margin-top:4px\">{{ evSourceLabel }}</div>\n                </div>\n                <div style=\"display:contents\" onclick=\"{{ evStartOver }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Start over</x-import></div>\n              </div>\n\n              <!-- Live video preview: a 16:9 canvas that shows exactly what the\n                   final video will contain — background + captions only. The song\n                   title stays in the header above, outside the frame. Export\n                   re-renders the same frames at 1920×1080 and records them with\n                   the song's audio into a WebM file. -->\n              <sc-if value=\"{{ evShowPreview }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin:0 0 12px\">\n                  <!-- The preview works like a phone video editor: tap the video\n                       itself to play/pause (big play badge while paused), drag the\n                       bar underneath to jump anywhere. On phones this whole block\n                       sticks under the header while the styling controls scroll. -->\n                  <div class=\"ev-preview-sticky\" style=\"border-radius:var(--radius-lg)\">\n                    <div onclick=\"{{ evTogglePlay }}\" role=\"button\" aria-label=\"{{ evPlayLabel }}\" style=\"position:relative;border-radius:var(--radius-lg);overflow:hidden;border:var(--border-hairline) solid var(--border-subtle);cursor:pointer\">\n                      <canvas data-ev-canvas=\"1\" width=\"1280\" height=\"720\" style=\"display:block;width:100%;height:auto;pointer-events:none\"></canvas>\n                      <sc-if value=\"{{ evShowBigPlay }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,0.15);pointer-events:none\">\n                          <div style=\"width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,0.94);display:grid;place-items:center;box-shadow:0 4px 18px rgba(0,0,0,0.35)\">\n                            <svg sc-camel-view-box=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"#111827\" aria-hidden=\"true\" style=\"margin-left:3px\"><path d=\"M8 5v14l11-7z\"></path></svg>\n                          </div>\n                        </div>\n                      </sc-if>\n                    </div>\n                    <sc-if value=\"{{ evHasAudio }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex;align-items:center;gap:8px;padding:8px 4px 6px\">\n                        <button type=\"button\" onclick=\"{{ evTogglePlay }}\" aria-label=\"{{ evPlayLabel }}\" title=\"{{ evPlayLabel }}\" style=\"appearance:none;border:0;cursor:pointer;width:36px;height:36px;flex:none;border-radius:50%;background:var(--brand);color:var(--text-on-brand,#fff);display:grid;place-items:center\">\n                          <sc-if value=\"{{ evPlaying }}\" hint-placeholder-val=\"{{ false }}\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"currentColor\" aria-hidden=\"true\"><rect x=\"6\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"></rect><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"></rect></svg></sc-if>\n                          <sc-if value=\"{{ evPaused }}\" hint-placeholder-val=\"{{ true }}\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M8 5v14l11-7z\"></path></svg></sc-if>\n                        </button>\n                        <span data-ev-cur=\"1\" style=\"font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary);flex:none;min-width:32px;text-align:right\">{{ evCurLabel }}</span>\n                        <div data-ev-scrub=\"1\" role=\"slider\" aria-label=\"Jump anywhere in the song\" style=\"flex:1;min-width:0;height:32px;display:flex;align-items:center;position:relative;cursor:pointer;touch-action:none\">\n                          <div style=\"width:100%;height:6px;border-radius:var(--radius-pill);background:var(--border-subtle);overflow:hidden;pointer-events:none\">\n                            <div data-ev-scrub-fill=\"1\" style=\"height:100%;border-radius:var(--radius-pill);background:var(--brand);width:{{ evProgressPct }};pointer-events:none\"></div>\n                          </div>\n                          <sc-for list=\"{{ evMarkers }}\" as=\"mk\" hint-placeholder-count=\"0\">\n                            <div style=\"position:absolute;top:50%;left:{{ mk.left }};width:2px;height:6px;transform:translate(-50%,-50%);border-radius:1px;background:rgba(0,0,0,0.3);pointer-events:none\"></div>\n                          </sc-for>\n                          <div data-ev-scrub-thumb=\"1\" style=\"position:absolute;top:50%;left:{{ evProgressPct }};transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,0.4);pointer-events:none\"></div>\n                        </div>\n                        <span style=\"font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-secondary);flex:none;min-width:32px\">{{ evDurLabel }}</span>\n                      </div>\n                    </sc-if>\n                  </div>\n                  <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-top:6px;text-align:center\">Video preview — tap the video to play or pause, drag the bar to jump anywhere. The finished video holds only your background and captions. Small ticks mark your caption lines.</div>\n\n                  <!-- Export: record this preview (full HD) + the song into a WebM download -->\n                  <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin-top:12px\">\n                    <sc-if value=\"{{ evCanExport }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:contents\" onclick=\"{{ evStartExport }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" hint-size=\"auto,40px\">Export Video</x-import></div>\n                    </sc-if>\n                    <sc-if value=\"{{ evExportDisabled }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span title=\"{{ evExportTip }}\" style=\"display:inline-flex;align-items:center;border-radius:var(--radius-md);background:var(--surface-sunken);color:var(--text-tertiary);font-size:var(--text-sm);font-weight:var(--weight-semibold);padding:11px 18px;cursor:not-allowed\">Export Video — {{ evExportWhy }}</span>\n                    </sc-if>\n                    <sc-if value=\"{{ evShowPhotosBtn }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:contents\" onclick=\"{{ evSaveToPhotos }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" hint-size=\"auto,40px\">Save to iPhone Photos</x-import></div>\n                    </sc-if>\n                    <sc-if value=\"{{ hasEvExport }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:contents\" onclick=\"{{ evDownloadExport }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" hint-size=\"auto,40px\">{{ evDownloadBtnLabel }}</x-import></div>\n                    </sc-if>\n                    <sc-if value=\"{{ evShowSaveBtn }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:contents\" onclick=\"{{ evSaveToDrive }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" hint-size=\"auto,40px\">Save to Google Drive</x-import></div>\n                    </sc-if>\n                  </div>\n                  <sc-if value=\"{{ evExportUnsupported }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:10px;background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal)\">{{ evExportUnsupportedMsg }}</div>\n                  </sc-if>\n                  <sc-if value=\"{{ hasEvExport }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:10px;background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-normal)\">\n                      <div style=\"font-weight:var(--weight-semibold);color:var(--text-strong)\">Your video is ready ✓</div>\n                      <div style=\"font-size:var(--text-xs);margin-top:4px\">{{ evExportReadyNote }}</div>\n                      <sc-if value=\"{{ evExportTooBig }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"font-size:var(--text-xs);margin-top:8px;color:var(--text-primary)\"><b>Heads-up:</b> this file is over 35 MB — too big to auto-save to Google Drive from here. Use the downloaded copy instead: open <a href=\"https://drive.google.com\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--text-accent)\">drive.google.com</a> and drag the file into the “Tune Studio Videos” folder.</div>\n                      </sc-if>\n\n                      <!-- Save to Drive: optional log fields, upload progress, then the Drive link -->\n                      <sc-if value=\"{{ evShowSaveForm }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"margin-top:12px;border-top:var(--border-hairline) solid var(--border-subtle);padding-top:12px\">\n                          <div style=\"font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-bottom:8px\"><b>Save to Google Drive</b> puts this video in your “Tune Studio Videos” Drive folder and logs it on the Videos tab of your Sheet. Optional: add a YouTube link and a note for the log first.</div>\n                          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                            <input aria-label=\"YouTube link (optional)\" data-ev-save-field=\"yt\" oninput=\"{{ onEvSaveField }}\" placeholder=\"YouTube link (optional)\" style=\"flex:1;min-width:180px;box-sizing:border-box;padding:8px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n                            <input aria-label=\"Notes (optional)\" data-ev-save-field=\"notes\" oninput=\"{{ onEvSaveField }}\" placeholder=\"Notes (optional)\" style=\"flex:1;min-width:180px;box-sizing:border-box;padding:8px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n                          </div>\n                        </div>\n                      </sc-if>\n                      <sc-if value=\"{{ evSaving }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"margin-top:12px;border-top:var(--border-hairline) solid var(--border-subtle);padding-top:12px;display:flex;align-items:center;gap:10px\">\n                          <div style=\"width:18px;height:18px;flex:none;border-radius:50%;border:2.5px solid var(--blue-100);border-top-color:var(--accent);animation:ts-spin 0.8s linear infinite\"></div>\n                          <span data-ev-save-pct=\"1\" style=\"font-size:var(--text-xs);color:var(--text-secondary)\">Preparing the upload…</span>\n                        </div>\n                      </sc-if>\n                      <sc-if value=\"{{ hasEvSaveDone }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"margin-top:12px;border-top:var(--border-hairline) solid var(--border-subtle);padding-top:12px\">\n                          <div style=\"font-weight:var(--weight-semibold);color:var(--green-600);font-size:var(--text-sm)\">Saved to Google Drive ✓</div>\n                          <div style=\"font-size:var(--text-xs);margin-top:4px;line-height:var(--leading-normal)\">It’s in your “Tune Studio Videos” folder and logged on the Videos tab of your Sheet.\n                            <sc-if value=\"{{ hasEvSaveDriveLink }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ evSaveDriveLink }}\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--text-accent);font-weight:var(--weight-semibold)\">Open it in Drive</a></sc-if>\n                          </div>\n                        </div>\n                      </sc-if>\n                      <sc-if value=\"{{ hasEvSaveError }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"margin-top:12px;background:var(--danger-soft);border:var(--border-hairline) solid var(--red-100);color:var(--red-600);border-radius:var(--radius-md);padding:10px 12px;font-size:var(--text-xs);line-height:var(--leading-normal)\">{{ evSaveError }}</div>\n                      </sc-if>\n                    </div>\n                  </sc-if>\n                </div>\n              </sc-if>\n\n              <sc-if value=\"{{ evNeedsAudio }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:14px 16px;font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-normal);margin:0 0 14px\">\n                  <div style=\"font-weight:var(--weight-semibold);color:var(--text-strong);margin-bottom:4px\">This song doesn't have audio yet</div>\n                  <div>No playable audio link was saved with it — upload the song's MP3 or WAV from your computer instead. The file stays in your browser.</div>\n                  <label role=\"button\" tabindex=\"0\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:10px;background:var(--surface-card);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);padding:9px 14px;cursor:pointer;font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-accent)\">\n                    <input type=\"file\" accept=\".mp3,.wav,audio/mpeg,audio/wav,audio/x-wav\" aria-label=\"Upload audio for this song\" onchange=\"{{ onEvFile }}\" style=\"display:none\">\n                    <svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"></path><path d=\"M17 8l-5-5-5 5\"></path><path d=\"M12 3v12\"></path></svg>\n                    Upload audio file\n                  </label>\n                </div>\n              </sc-if>\n\n              <sc-if value=\"{{ evShowMiniPlayer }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:14px 16px;margin:0 0 16px\">\n                  <div style=\"display:flex;align-items:center;gap:12px\">\n                    <button type=\"button\" onclick=\"{{ evTogglePlay }}\" aria-label=\"{{ evPlayLabel }}\" title=\"{{ evPlayLabel }}\" style=\"appearance:none;border:0;cursor:pointer;width:40px;height:40px;flex:none;border-radius:50%;background:var(--brand);color:var(--text-on-brand,#fff);display:grid;place-items:center\">\n                      <sc-if value=\"{{ evPlaying }}\" hint-placeholder-val=\"{{ false }}\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"currentColor\" aria-hidden=\"true\"><rect x=\"6\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"></rect><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"></rect></svg></sc-if>\n                      <sc-if value=\"{{ evPaused }}\" hint-placeholder-val=\"{{ true }}\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M8 5v14l11-7z\"></path></svg></sc-if>\n                    </button>\n                    <div onclick=\"{{ onEvSeek }}\" role=\"slider\" aria-label=\"Seek\" style=\"flex:1;min-width:0;height:22px;display:flex;align-items:center;cursor:pointer\">\n                      <div style=\"width:100%;height:8px;border-radius:var(--radius-pill);background:var(--border-subtle);overflow:hidden;pointer-events:none\">\n                        <div style=\"height:100%;border-radius:var(--radius-pill);background:var(--brand);width:{{ evProgressPct }}\"></div>\n                      </div>\n                    </div>\n                    <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);flex:none;white-space:nowrap\">{{ evTimeLabel }}</span>\n                  </div>\n                  <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ evAudioName }}</div>\n                </div>\n              </sc-if>\n\n              <!-- Auto-caption in flight / failed: shown on both the paste and\n                   ready steps, right under the player the audio came from -->\n              <sc-if value=\"{{ evAcBusy }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;margin:0 0 14px;display:flex;align-items:center;gap:10px\">\n                  <div style=\"width:18px;height:18px;flex:none;border-radius:50%;border:2.5px solid var(--blue-100);border-top-color:var(--accent);animation:ts-spin 0.8s linear infinite\"></div>\n                  <div style=\"min-width:0;flex:1\">\n                    <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">Auto-captioning…</div>\n                    <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin-top:2px;line-height:var(--leading-normal)\">{{ evAcPhase }}</div>\n                  </div>\n                </div>\n              </sc-if>\n              <sc-if value=\"{{ hasEvAcError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:var(--danger-soft);border:var(--border-hairline) solid var(--red-100);color:var(--red-600);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);line-height:var(--leading-normal);margin:0 0 14px\">{{ evAcError }}</div>\n              </sc-if>\n\n              <!-- Step 2 (upload path) · paste the lyrics -->\n              <sc-if value=\"{{ evShowPaste }}\" hint-placeholder-val=\"{{ false }}\">\n                <label style=\"display:block;font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Paste the lyrics — one line per line of text</label>\n                <textarea aria-label=\"Paste lyrics\" rows=\"12\" placeholder=\"[Verse 1]&#10;First lyric line&#10;Second lyric line&#10;&#10;[Chorus]&#10;…\" style=\"width:100%;box-sizing:border-box;padding:14px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);line-height:var(--leading-relaxed);color:var(--text-primary);background:var(--surface-card);font-family:inherit;resize:vertical\"></textarea>\n                <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-top:6px;line-height:var(--leading-normal)\">Blank lines and lines in [brackets] are treated as section breaks — they won't become caption lines.</div>\n                <div style=\"display:flex;justify-content:flex-end;margin-top:12px\">\n                  <div style=\"display:contents\" onclick=\"{{ evLoadPasted }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" hint-size=\"auto,40px\">Load lyrics</x-import></div>\n                </div>\n                <sc-if value=\"{{ evShowAcPaste }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:16px;border-top:var(--border-hairline) solid var(--border-subtle);padding-top:14px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px\">\n                    <div style=\"flex:1;min-width:220px\">\n                      <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">No lyrics handy?</div>\n                      <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin-top:3px;line-height:var(--leading-normal)\">The AI can listen to the song and write timed captions for you. You'll review every line before anything is used — AI transcription of music makes mistakes.</div>\n                    </div>\n                    <div style=\"display:contents\" onclick=\"{{ evAutoCaption }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Auto-caption (AI)</x-import></div>\n                  </div>\n                </sc-if>\n              </sc-if>\n\n              <!-- Lyric lines · numbered, click to edit -->\n              <sc-if value=\"{{ evShowReady }}\" hint-placeholder-val=\"{{ false }}\">\n\n                <!-- Caption style + look. One delegated click handler reads\n                     data-ev-set/data-ev-val off whatever got clicked; the two\n                     color pickers are the only separate inputs. Thumbnails are\n                     small canvases painted by the same renderer as the preview,\n                     so they always show the real look (your colors and font). -->\n                <div onclick=\"{{ onEvStyleControl }}\" style=\"margin:0 0 18px\">\n                  <!-- Templates: complete pre-designed looks. Each card is a live\n                       canvas painted by the same renderer as the preview, in that\n                       template's own colors and font — one tap applies it all. -->\n                  <div style=\"display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:0 0 8px\">\n                    <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">Templates</div>\n                    <sc-if value=\"{{ hasEvTplBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"font-size:var(--text-2xs);color:var(--text-tertiary)\">{{ evTplBadge }}</span>\n                    </sc-if>\n                  </div>\n                  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:0 0 16px\">\n                    <sc-for list=\"{{ evTemplateOpts }}\" as=\"tp\" hint-placeholder-count=\"0\">\n                      <div data-ev-set=\"template\" data-ev-val=\"{{ tp.id }}\" role=\"button\" tabindex=\"0\" aria-label=\"Apply the {{ tp.name }} template\" style=\"cursor:pointer;border:2px solid {{ tp.border }};border-radius:var(--radius-md);padding:5px 5px 7px;background:var(--surface-card)\">\n                        <canvas data-ev-tpl-thumb=\"{{ tp.id }}\" width=\"240\" height=\"135\" style=\"display:block;width:100%;height:auto;border-radius:4px;pointer-events:none\"></canvas>\n                        <div style=\"font-size:var(--text-xs);font-weight:{{ tp.weight }};color:{{ tp.fg }};margin-top:6px;text-align:center\">{{ tp.name }}</div>\n                      </div>\n                    </sc-for>\n                  </div>\n\n                  <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong);margin:0 0 8px\">Caption style</div>\n                  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px\">\n                    <sc-for list=\"{{ evStyleOpts }}\" as=\"so\" hint-placeholder-count=\"0\">\n                      <div data-ev-set=\"style\" data-ev-val=\"{{ so.id }}\" role=\"button\" tabindex=\"0\" aria-label=\"{{ so.name }} caption style\" style=\"cursor:pointer;border:2px solid {{ so.border }};border-radius:var(--radius-md);padding:5px 5px 7px;background:var(--surface-card)\">\n                        <canvas data-ev-thumb=\"{{ so.id }}\" width=\"240\" height=\"135\" style=\"display:block;width:100%;height:auto;border-radius:4px;pointer-events:none\"></canvas>\n                        <div style=\"font-size:var(--text-xs);font-weight:{{ so.weight }};color:{{ so.fg }};margin-top:6px;text-align:center\">{{ so.name }}</div>\n                      </div>\n                    </sc-for>\n                  </div>\n\n                  <div style=\"display:flex;flex-wrap:wrap;gap:14px 24px;margin-top:14px\">\n                    <div>\n                      <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Text size</div>\n                      <div style=\"display:inline-flex;background:var(--surface-sunken);border-radius:var(--radius-md);padding:3px;gap:2px\">\n                        <sc-for list=\"{{ evSizeOpts }}\" as=\"o\" hint-placeholder-count=\"0\">\n                          <button type=\"button\" data-ev-set=\"size\" data-ev-val=\"{{ o.id }}\" aria-label=\"Text size {{ o.label }}\" style=\"appearance:none;border:0;cursor:pointer;font-family:inherit;font-size:var(--text-xs);font-weight:{{ o.weight }};padding:7px 12px;border-radius:var(--radius-sm);color:{{ o.fg }};background:{{ o.bg }};box-shadow:{{ o.sh }};white-space:nowrap\">{{ o.label }}</button>\n                        </sc-for>\n                      </div>\n                    </div>\n                    <div>\n                      <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Text position</div>\n                      <div style=\"display:inline-flex;background:var(--surface-sunken);border-radius:var(--radius-md);padding:3px;gap:2px\">\n                        <sc-for list=\"{{ evPosOpts }}\" as=\"o\" hint-placeholder-count=\"0\">\n                          <button type=\"button\" data-ev-set=\"pos\" data-ev-val=\"{{ o.id }}\" aria-label=\"Text position {{ o.label }}\" style=\"appearance:none;border:0;cursor:pointer;font-family:inherit;font-size:var(--text-xs);font-weight:{{ o.weight }};padding:7px 12px;border-radius:var(--radius-sm);color:{{ o.fg }};background:{{ o.bg }};box-shadow:{{ o.sh }};white-space:nowrap\">{{ o.label }}</button>\n                        </sc-for>\n                      </div>\n                    </div>\n                  </div>\n\n                  <div style=\"margin-top:14px\">\n                    <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Font</div>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                      <sc-for list=\"{{ evFontOpts }}\" as=\"f\" hint-placeholder-count=\"0\">\n                        <button type=\"button\" data-ev-set=\"font\" data-ev-val=\"{{ f.id }}\" aria-label=\"Font {{ f.name }}\" style=\"appearance:none;cursor:pointer;font-family:{{ f.css }};font-size:var(--text-sm);padding:8px 14px;border-radius:var(--radius-md);border:2px solid {{ f.border }};background:var(--surface-card);color:{{ f.fg }};font-weight:{{ f.weight }}\">{{ f.name }}</button>\n                      </sc-for>\n                    </div>\n                  </div>\n\n                  <div style=\"display:flex;flex-wrap:wrap;gap:14px 24px;margin-top:14px\">\n                    <div>\n                      <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Text color</div>\n                      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:7px\">\n                        <sc-for list=\"{{ evTextSwatches }}\" as=\"sw\" hint-placeholder-count=\"0\">\n                          <button type=\"button\" data-ev-set=\"color\" data-ev-val=\"{{ sw.c }}\" aria-label=\"Text color {{ sw.c }}\" style=\"appearance:none;border:0;cursor:pointer;width:26px;height:26px;border-radius:50%;background:{{ sw.c }};box-shadow:{{ sw.ring }};padding:0;flex:none\"></button>\n                        </sc-for>\n                        <input type=\"color\" aria-label=\"Pick any text color\" oninput=\"{{ onEvTextColorPick }}\" onchange=\"{{ onEvTextColorPick }}\" title=\"Pick any text color\" style=\"width:36px;height:28px;padding:1px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-sm);background:var(--surface-card);cursor:pointer;flex:none\">\n                      </div>\n                    </div>\n                    <div>\n                      <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:4px\">Background color</div>\n                      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:7px\">\n                        <sc-for list=\"{{ evBgSwatches }}\" as=\"sw\" hint-placeholder-count=\"0\">\n                          <button type=\"button\" data-ev-set=\"bg\" data-ev-val=\"{{ sw.c }}\" aria-label=\"Background color {{ sw.c }}\" style=\"appearance:none;border:0;cursor:pointer;width:26px;height:26px;border-radius:50%;background:{{ sw.c }};box-shadow:{{ sw.ring }};padding:0;flex:none\"></button>\n                        </sc-for>\n                        <input type=\"color\" aria-label=\"Pick any background color\" oninput=\"{{ onEvBgColorPick }}\" onchange=\"{{ onEvBgColorPick }}\" title=\"Pick any background color\" style=\"width:36px;height:28px;padding:1px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-sm);background:var(--surface-card);cursor:pointer;flex:none\">\n                      </div>\n                    </div>\n                  </div>\n\n                  <sc-if value=\"{{ hasEvContrastWarn }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:12px;background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:10px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal)\"><b>This text may be hard to read on this background.</b> You can keep it — or pick a lighter/darker color for one of the two.</div>\n                  </sc-if>\n                </div>\n\n                <!-- Post-sync summary: how many lines are timed, what's missing -->\n                <sc-if value=\"{{ hasEvSummary }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;margin:0 0 14px;display:flex;gap:10px;align-items:flex-start\">\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">{{ evSummaryTitle }}</div>\n                      <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin-top:4px;line-height:var(--leading-normal)\">{{ evSummaryBody }}</div>\n                    </div>\n                    <button type=\"button\" onclick=\"{{ evDismissSummary }}\" aria-label=\"Dismiss summary\" title=\"Dismiss\" style=\"appearance:none;border:0;background:transparent;cursor:pointer;color:var(--text-tertiary);font-size:16px;line-height:1;padding:2px;flex:none\">×</button>\n                  </div>\n                </sc-if>\n\n                <!-- One-line next-step hint before any timings exist -->\n                <sc-if value=\"{{ evShowNextHint }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin:0 0 10px;line-height:var(--leading-normal)\">Next: <b>Auto-caption (AI)</b> or tap <b>Sync lyrics</b> to time your captions.</div>\n                </sc-if>\n\n                <!-- Timing toolbar: start a sync run, keep or restore a safety copy -->\n                <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 16px\">\n                  <sc-if value=\"{{ evCanSync }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:contents\" onclick=\"{{ evSyncLyrics }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" size=\"sm\" hint-size=\"auto,32px\">{{ evSyncBtnLabel }}</x-import></div>\n                  </sc-if>\n                  <sc-if value=\"{{ evShowAcBtn }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:contents\" onclick=\"{{ evAutoCaption }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Auto-caption (AI)</x-import></div>\n                  </sc-if>\n                  <sc-if value=\"{{ evSyncDisabled }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span title=\"Add audio to this song first — syncing needs something to play along to.\" style=\"display:inline-flex;align-items:center;border-radius:var(--radius-md);background:var(--surface-sunken);color:var(--text-tertiary);font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:9px 14px;cursor:not-allowed\">Sync lyrics — add audio first</span>\n                  </sc-if>\n                  <sc-if value=\"{{ evHasTimings }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:contents\" onclick=\"{{ evExportTimings }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Save timing file</x-import></div>\n                  </sc-if>\n                  <label role=\"button\" tabindex=\"0\" style=\"display:inline-flex;align-items:center;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-md);font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:8px 12px;cursor:pointer\">\n                    <input type=\"file\" accept=\".txt,.json,text/plain,application/json\" aria-label=\"Load timing file\" onchange=\"{{ onEvTimingsFile }}\" style=\"display:none\">\n                    Load timing file\n                  </label>\n                  <sc-if value=\"{{ evHasTimings }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:contents\" onclick=\"{{ evClearTimings }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">Clear all timings</x-import></div>\n                  </sc-if>\n                </div>\n\n                <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 0 10px\">\n                  <span style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong)\">{{ evCountLabel }}</span>\n                  <div style=\"display:contents\" onclick=\"{{ evAddLine }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">+ Add line</x-import></div>\n                </div>\n                <div onclick=\"{{ onEvLineClick }}\" style=\"display:flex;flex-direction:column\">\n                  <sc-for list=\"{{ evRows }}\" as=\"row\" hint-placeholder-count=\"0\">\n                    <sc-if value=\"{{ row.isSec }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent);padding:14px 8px 4px\">{{ row.secLabel }}</div>\n                    </sc-if>\n                    <sc-if value=\"{{ row.isLine }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div data-ev-line=\"{{ row.idx }}\" role=\"button\" tabindex=\"0\" aria-label=\"Edit line {{ row.num }}\" style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--duration-fast) var(--ease-standard)\" style-hover=\"background:var(--surface-hover)\">\n                        <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-tertiary);min-width:30px;text-align:right;flex:none\">{{ row.num }}</span>\n                        <span style=\"font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-normal);overflow-wrap:break-word;min-width:0;flex:1\">{{ row.text }}</span>\n                        <sc-if value=\"{{ row.hasTime }}\" hint-placeholder-val=\"{{ false }}\">\n                          <span style=\"flex:none;display:inline-flex;align-items:center;gap:4px\">\n                            <span title=\"When this caption appears\" style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-accent);background:var(--surface-accent-soft);border-radius:var(--radius-pill);padding:3px 9px\">{{ row.timeLabel }}</span>\n                            <button type=\"button\" data-ev-tact=\"minus\" title=\"0.1 second earlier\" aria-label=\"Line {{ row.num }} 0.1 second earlier\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-sm);cursor:pointer;width:32px;height:32px;display:grid;place-items:center;font-size:16px;line-height:1;font-family:inherit;padding:0\">−</button>\n                            <button type=\"button\" data-ev-tact=\"plus\" title=\"0.1 second later\" aria-label=\"Line {{ row.num }} 0.1 second later\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-sm);cursor:pointer;width:32px;height:32px;display:grid;place-items:center;font-size:16px;line-height:1;font-family:inherit;padding:0\">+</button>\n                            <button type=\"button\" data-ev-tact=\"play\" title=\"Preview from this line — plays 2 seconds before it so you see the caption land\" aria-label=\"Preview from line {{ row.num }}\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-accent);border-radius:var(--radius-sm);cursor:pointer;width:32px;height:32px;display:grid;place-items:center;padding:0\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"12\" height=\"12\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M8 5v14l11-7z\"></path></svg></button>\n                            <button type=\"button\" data-ev-tact=\"resync\" title=\"Re-sync from here — lines above keep their times; you re-tap from this one on\" aria-label=\"Re-sync from line {{ row.num }}\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-sm);cursor:pointer;height:32px;padding:0 10px;font-family:inherit;font-size:var(--text-2xs);font-weight:var(--weight-semibold)\">Re-sync</button>\n                          </span>\n                        </sc-if>\n                        <sc-if value=\"{{ row.showStartHere }}\" hint-placeholder-val=\"{{ false }}\">\n                          <button type=\"button\" data-ev-tact=\"resync\" title=\"Start tapping timings from this line — lines above keep their times\" aria-label=\"Sync from line {{ row.num }}\" style=\"appearance:none;border:0;background:var(--brand-soft);color:var(--brand);border-radius:var(--radius-pill);cursor:pointer;height:32px;padding:0 12px;font-family:inherit;font-size:var(--text-2xs);font-weight:var(--weight-semibold);flex:none\">Sync from here</button>\n                        </sc-if>\n                      </div>\n                    </sc-if>\n                    <sc-if value=\"{{ row.editing }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div onclick=\"{{ onEvLineAction }}\" style=\"display:flex;gap:10px;align-items:center;padding:7px 8px;border-radius:var(--radius-sm);background:var(--surface-accent-soft);flex-wrap:wrap\">\n                        <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-tertiary);min-width:30px;text-align:right;flex:none\">{{ row.num }}</span>\n                        <input aria-label=\"Edit lyric line\" onkeydown=\"{{ onEvLineKey }}\" style=\"flex:1;min-width:160px;box-sizing:border-box;padding:8px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n                        <span style=\"display:inline-flex;gap:6px;flex:none\">\n                          <button type=\"button\" data-ev-act=\"done\" style=\"appearance:none;border:0;cursor:pointer;background:var(--brand);color:var(--text-on-brand,#fff);border-radius:var(--radius-md);font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:8px 12px\">Done</button>\n                          <button type=\"button\" data-ev-act=\"insert\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);cursor:pointer;background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-md);font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:8px 12px\">+ Line below</button>\n                          <button type=\"button\" data-ev-act=\"delete\" style=\"appearance:none;border:var(--border-hairline) solid var(--red-100);cursor:pointer;background:var(--danger-soft);color:var(--red-600);border-radius:var(--radius-md);font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:8px 12px\">Delete</button>\n                        </span>\n                      </div>\n                    </sc-if>\n                  </sc-for>\n                </div>\n                <div style=\"background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:12px 14px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal);margin-top:14px\">Click a line's words to fix a typo, delete it, or add a missing line below it. Hit <b>Sync lyrics</b> to tap each line in time with the music — each tap marks when that caption appears (it stays up until the next one). Or hit <b>Auto-caption (AI)</b> and the AI listens to the song and times every line for you — you review and fix its work before anything is used, and tap-sync is always there to redo a bad result. Afterwards, fine-tune any line with − / + (0.1 second per press) and its play button, which starts 2 seconds before the line. Section names like [Verse] stay as headers — they never become captions.</div>\n              </sc-if>\n            </sc-if>\n\n          </x-import>\n\n          <!-- My videos: everything logged on the Sheet's Videos tab -->\n          <div style=\"margin-top:20px\">\n            <x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Card\" padded=\"{{ true }}\" hint-size=\"100%,120px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap\">\n                <div>\n                  <h3 style=\"font-size:var(--text-base);font-weight:var(--weight-semibold);letter-spacing:var(--tracking-snug);margin:0;color:var(--text-strong)\">My videos</h3>\n                  <div style=\"font-size:var(--text-xs);color:var(--text-tertiary);margin-top:4px\">Every video saved to Google Drive, straight from your Sheet’s Videos tab.</div>\n                </div>\n                <div style=\"display:contents\" onclick=\"{{ evLoadVideos }}\"><x-import component-from-global-scope=\"AdsitDesignSystem_ab046a.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"auto,32px\">{{ evVideosBtnLabel }}</x-import></div>\n              </div>\n              <sc-if value=\"{{ hasEvVideosError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:var(--danger-soft);border:var(--border-hairline) solid var(--red-100);color:var(--red-600);border-radius:var(--radius-md);padding:10px 12px;font-size:var(--text-xs);line-height:var(--leading-normal);margin-top:12px\">{{ evVideosError }}</div>\n              </sc-if>\n              <sc-if value=\"{{ evVideosEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"text-align:center;padding:18px 16px 6px;color:var(--text-secondary);font-size:var(--text-sm);line-height:var(--leading-relaxed)\">No videos saved yet — export a video above and press <b>Save to Google Drive</b>.</div>\n              </sc-if>\n              <sc-if value=\"{{ evHasVideos }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:14px\">\n                  <sc-for list=\"{{ evVideoRows }}\" as=\"vid\" hint-placeholder-count=\"0\">\n                    <div style=\"background:var(--surface-sunken);border-radius:var(--radius-lg);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap\">\n                      <div style=\"min-width:0;flex:1\">\n                        <div style=\"font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ vid.title }}</div>\n                        <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);margin-top:4px\">{{ vid.meta }}</div>\n                        <sc-if value=\"{{ vid.hasNotes }}\" hint-placeholder-val=\"{{ false }}\">\n                          <div style=\"font-size:var(--text-xs);color:var(--text-secondary);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ vid.notes }}</div>\n                        </sc-if>\n                      </div>\n                      <span style=\"display:inline-flex;gap:14px;flex:none;align-items:center\">\n                        <sc-if value=\"{{ vid.hasDrive }}\" hint-placeholder-val=\"{{ false }}\">\n                          <a href=\"{{ vid.driveLink }}\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--text-accent);font-size:var(--text-xs);font-weight:var(--weight-semibold);text-decoration:none\" style-hover=\"text-decoration:underline\">Drive</a>\n                        </sc-if>\n                        <sc-if value=\"{{ vid.hasYouTube }}\" hint-placeholder-val=\"{{ false }}\">\n                          <a href=\"{{ vid.youtubeLink }}\" target=\"_blank\" rel=\"noopener\" onclick=\"{{ openYouTube }}\" style=\"color:var(--text-accent);font-size:var(--text-xs);font-weight:var(--weight-semibold);text-decoration:none\" style-hover=\"text-decoration:underline\">YouTube</a>\n                        </sc-if>\n                      </span>\n                    </div>\n                  </sc-for>\n                </div>\n              </sc-if>\n            </x-import>\n          </div>\n        </div>\n\n        <!-- Export progress: full-screen while recording, so no style, timing\n             or lyric can change mid-recording — the whole app sits behind it.\n             The bar and clock are updated straight in the DOM (no re-renders),\n             the same trick the sync view uses. -->\n        <sc-if value=\"{{ evShowExport }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:fixed;inset:0;z-index:5000;background:var(--surface-page,#fbfcfe);display:flex;align-items:center;justify-content:center;padding:24px\">\n            <div style=\"max-width:560px;width:100%;background:var(--surface-card);border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg,0 12px 40px rgba(0,0,0,0.16));padding:26px 26px 22px;text-align:center;box-sizing:border-box\">\n              <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)\">Exporting video</div>\n              <div style=\"font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-semibold);color:var(--text-strong);margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ evTitle }}</div>\n              <div style=\"margin:18px 0 10px;height:10px;border-radius:var(--radius-pill);background:var(--border-subtle);overflow:hidden\">\n                <div data-ev-export-fill=\"1\" style=\"height:100%;width:0%;border-radius:var(--radius-pill);background:var(--brand);transition:width 0.25s linear\"></div>\n              </div>\n              <div style=\"display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary)\">\n                <span data-ev-export-pct=\"1\">0%</span>\n                <span data-ev-export-time=\"1\">{{ evExportTimeLabel }}</span>\n              </div>\n              <div style=\"margin-top:16px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-relaxed);text-align:left;background:var(--surface-sunken);border-radius:var(--radius-md);padding:12px 14px\">{{ evExportNote }}</div>\n              <button type=\"button\" onclick=\"{{ evCancelExport }}\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-md);cursor:pointer;font-family:inherit;font-size:var(--text-sm);font-weight:var(--weight-semibold);padding:10px 20px;margin-top:16px\">Cancel export</button>\n            </div>\n          </div>\n        </sc-if>\n\n        <!-- Focused sync view: full-screen, distraction-free tap-along -->\n        <sc-if value=\"{{ evShowSync }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:fixed;inset:0;z-index:5000;background:var(--surface-page,#fbfcfe);display:flex;flex-direction:column\">\n            <div style=\"flex:none;background:var(--surface-card);border-bottom:var(--border-hairline) solid var(--border-subtle)\">\n              <div style=\"max-width:760px;margin:0 auto;width:100%;box-sizing:border-box;padding:12px 18px\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <div style=\"min-width:0;flex:1\">\n                    <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)\">Syncing lyrics</div>\n                    <div style=\"font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ evTitle }}</div>\n                  </div>\n                  <button type=\"button\" onclick=\"{{ evSyncTogglePause }}\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-md);cursor:pointer;font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:9px 14px;flex:none\">{{ evSyncPauseLabel }}</button>\n                  <button type=\"button\" onclick=\"{{ evEndSyncNow }}\" title=\"Stop syncing — keeps the taps you've made so far\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-md);cursor:pointer;font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:9px 14px;flex:none\">Done</button>\n                </div>\n                <div style=\"display:flex;align-items:center;gap:10px;margin-top:10px\">\n                  <div style=\"flex:1;min-width:0;height:8px;border-radius:var(--radius-pill);background:var(--border-subtle);overflow:hidden\">\n                    <div data-ev-sync-fill=\"1\" style=\"height:100%;border-radius:var(--radius-pill);background:var(--brand);width:{{ evSyncPct }}\"></div>\n                  </div>\n                  <span data-ev-sync-time=\"1\" style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-secondary);flex:none;white-space:nowrap\">{{ evSyncTimeLabel }}</span>\n                </div>\n                <sc-if value=\"{{ hasEvSyncMsg }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:8px;background:var(--danger-soft);border-radius:var(--radius-md);color:var(--red-600);font-size:var(--text-xs);padding:8px 12px;line-height:var(--leading-normal)\">{{ evSyncMsg }}</div>\n                </sc-if>\n              </div>\n            </div>\n            <div style=\"flex:1;overflow-y:auto;overscroll-behavior:contain\">\n              <div style=\"max-width:760px;margin:0 auto;width:100%;box-sizing:border-box;padding:20vh 18px 38vh\">\n                <sc-for list=\"{{ evSyncRows }}\" as=\"sr\" hint-placeholder-count=\"0\">\n                  <sc-if value=\"{{ sr.isSec }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary);padding:16px 8px 4px;opacity:0.7\">{{ sr.secLabel }}</div>\n                  </sc-if>\n                  <sc-if value=\"{{ sr.isLine }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div data-ev-sync-cur=\"{{ sr.curFlag }}\" style=\"display:flex;gap:12px;align-items:baseline;padding:7px 8px;opacity:{{ sr.op }}\">\n                      <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-accent);min-width:52px;text-align:right;flex:none\">{{ sr.stamp }}</span>\n                      <span style=\"font-size:{{ sr.size }};font-weight:{{ sr.weight }};color:{{ sr.fg }};line-height:var(--leading-snug);min-width:0;overflow-wrap:break-word\">{{ sr.text }}</span>\n                    </div>\n                  </sc-if>\n                </sc-for>\n              </div>\n            </div>\n            <div style=\"flex:none;background:var(--surface-card);border-top:var(--border-hairline) solid var(--border-subtle)\">\n              <div style=\"max-width:760px;margin:0 auto;width:100%;box-sizing:border-box;padding:12px 18px calc(12px + env(safe-area-inset-bottom))\">\n                <button type=\"button\" onclick=\"{{ evTap }}\" style=\"appearance:none;border:0;cursor:pointer;width:100%;min-height:88px;border-radius:var(--radius-lg);background:{{ evTapBg }};color:var(--text-on-brand,#fff);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;-webkit-tap-highlight-color:transparent;touch-action:manipulation\">\n                  <span style=\"font-family:var(--font-display);font-size:28px;font-weight:var(--weight-bold);letter-spacing:0.14em\">{{ evTapLabel }}</span>\n                  <span style=\"font-size:var(--text-xs);opacity:0.85\">{{ evTapHint }}</span>\n                </button>\n              </div>\n            </div>\n          </div>\n        </sc-if>\n\n        <!-- Auto-caption review: full-screen and MANDATORY — the AI's timed\n             lines can only reach the editor through \"Accept captions\" here.\n             Click a line's words to fix them, delete junk lines, and use ▶ to\n             hear each line land (it starts 2 seconds early). \"Discard\" throws\n             the whole proposal away and leaves everything as it was. -->\n        <sc-if value=\"{{ evShowReview }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:fixed;inset:0;z-index:5000;background:var(--surface-page,#fbfcfe);display:flex;flex-direction:column\">\n            <div style=\"flex:none;background:var(--surface-card);border-bottom:var(--border-hairline) solid var(--border-subtle)\">\n              <div style=\"max-width:760px;margin:0 auto;width:100%;box-sizing:border-box;padding:12px 18px\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <div style=\"min-width:0;flex:1\">\n                    <div style=\"font-family:var(--font-mono);font-size:var(--text-2xs);letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-accent)\">Review auto-captions · {{ evAcCountLabel }}</div>\n                    <div style=\"font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ evTitle }}</div>\n                  </div>\n                  <button type=\"button\" onclick=\"{{ evSyncTogglePause }}\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-primary);border-radius:var(--radius-md);cursor:pointer;font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:9px 14px;flex:none\">{{ evSyncPauseLabel }}</button>\n                </div>\n                <div style=\"margin-top:10px;background:var(--surface-accent-soft);border-radius:var(--radius-md);padding:10px 12px;font-size:var(--text-xs);color:var(--text-secondary);line-height:var(--leading-normal)\">The AI makes mistakes with music — check its work before it's used. Click a line's words to fix them, delete junk lines (a stray “la la la”), and press ▶ to hear a line land — it plays from 2 seconds before. Nothing touches your song until you press <b>Accept captions</b>.</div>\n              </div>\n            </div>\n            <div style=\"flex:1;overflow-y:auto;overscroll-behavior:contain\">\n              <div onclick=\"{{ onEvReviewClick }}\" style=\"max-width:760px;margin:0 auto;width:100%;box-sizing:border-box;padding:14px 18px 24px;display:flex;flex-direction:column\">\n                <sc-for list=\"{{ evAcRows }}\" as=\"ar\" hint-placeholder-count=\"0\">\n                  <sc-if value=\"{{ ar.isRow }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div data-ac-row=\"{{ ar.idx }}\" role=\"button\" tabindex=\"0\" aria-label=\"Fix caption line {{ ar.num }}\" style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--duration-fast) var(--ease-standard)\" style-hover=\"background:var(--surface-hover)\">\n                      <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-tertiary);min-width:30px;text-align:right;flex:none\">{{ ar.num }}</span>\n                      <span title=\"When this caption appears\" style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-accent);background:var(--surface-accent-soft);border-radius:var(--radius-pill);padding:3px 9px;flex:none\">{{ ar.stamp }}</span>\n                      <span style=\"font-size:var(--text-sm);color:var(--text-primary);line-height:var(--leading-normal);overflow-wrap:break-word;min-width:0;flex:1\">{{ ar.text }}</span>\n                      <span style=\"flex:none;display:inline-flex;align-items:center;gap:4px\">\n                        <button type=\"button\" data-ac-act=\"play\" title=\"Hear this line land — plays from 2 seconds before it\" aria-label=\"Play line {{ ar.num }} from 2 seconds before\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);background:var(--surface-card);color:var(--text-accent);border-radius:var(--radius-sm);cursor:pointer;width:32px;height:32px;display:grid;place-items:center;padding:0\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"12\" height=\"12\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M8 5v14l11-7z\"></path></svg></button>\n                        <button type=\"button\" data-ac-act=\"delete\" title=\"Delete this line — it won't become a caption\" aria-label=\"Delete line {{ ar.num }}\" style=\"appearance:none;border:var(--border-hairline) solid var(--red-100);background:var(--danger-soft);color:var(--red-600);border-radius:var(--radius-sm);cursor:pointer;width:32px;height:32px;display:grid;place-items:center;font-size:16px;line-height:1;font-family:inherit;padding:0\">×</button>\n                      </span>\n                    </div>\n                  </sc-if>\n                  <sc-if value=\"{{ ar.editing }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div data-ac-row=\"{{ ar.idx }}\" style=\"display:flex;gap:10px;align-items:center;padding:7px 8px;border-radius:var(--radius-sm);background:var(--surface-accent-soft);flex-wrap:wrap\">\n                      <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-tertiary);min-width:30px;text-align:right;flex:none\">{{ ar.num }}</span>\n                      <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-accent);background:var(--surface-card);border-radius:var(--radius-pill);padding:3px 9px;flex:none\">{{ ar.stamp }}</span>\n                      <input aria-label=\"Fix caption words\" onkeydown=\"{{ onEvReviewKey }}\" style=\"flex:1;min-width:160px;box-sizing:border-box;padding:8px 12px;border:var(--border-hairline) solid var(--border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-primary);background:var(--surface-card);font-family:inherit\">\n                      <span style=\"display:inline-flex;gap:6px;flex:none\">\n                        <button type=\"button\" data-ac-act=\"done\" style=\"appearance:none;border:0;cursor:pointer;background:var(--brand);color:var(--text-on-brand,#fff);border-radius:var(--radius-md);font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:8px 12px\">Done</button>\n                        <button type=\"button\" data-ac-act=\"delete\" style=\"appearance:none;border:var(--border-hairline) solid var(--red-100);cursor:pointer;background:var(--danger-soft);color:var(--red-600);border-radius:var(--radius-md);font-family:inherit;font-size:var(--text-xs);font-weight:var(--weight-semibold);padding:8px 12px\">Delete</button>\n                      </span>\n                    </div>\n                  </sc-if>\n                </sc-for>\n              </div>\n            </div>\n            <div style=\"flex:none;background:var(--surface-card);border-top:var(--border-hairline) solid var(--border-subtle)\">\n              <div style=\"max-width:760px;margin:0 auto;width:100%;box-sizing:border-box;padding:12px 18px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;flex-wrap:wrap\">\n                <button type=\"button\" onclick=\"{{ evAcceptCaptions }}\" style=\"appearance:none;border:0;cursor:pointer;flex:1;min-width:200px;min-height:48px;border-radius:var(--radius-lg);background:var(--brand);color:var(--text-on-brand,#fff);font-family:inherit;font-size:var(--text-sm);font-weight:var(--weight-semibold)\">Accept captions — use these timings</button>\n                <button type=\"button\" onclick=\"{{ evDiscardCaptions }}\" style=\"appearance:none;border:var(--border-hairline) solid var(--border-subtle);cursor:pointer;flex:none;min-height:48px;border-radius:var(--radius-lg);background:var(--surface-card);color:var(--text-primary);font-family:inherit;font-size:var(--text-sm);font-weight:var(--weight-semibold);padding:0 20px\">Discard</button>\n              </div>\n            </div>\n          </div>\n        </sc-if>\n      </section>\n    </sc-if>\n\n  </main>\n\n  <footer class=\"ts-footer\" style=\"max-width:var(--content-max);margin:0 auto;padding:0 24px 40px;color:var(--text-tertiary);font-size:var(--text-xs);text-align:center;line-height:var(--leading-relaxed)\">Tune Studio · Song data is AI-generated — double-check credits before publishing anything.</footer>\n</div>\n\n\n\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;playlistId&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;PL2OGLRh-7afJ3_8BuFR1N9QHIh2P_MYSU&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; },\n  &quot;aiModel&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;claude-haiku-4-5&quot;, &quot;claude-sonnet-4-5&quot;], &quot;default&quot;: &quot;claude-sonnet-4-5&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Behavior&quot; },\n  &quot;showSunoTab&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot; }\n}\">\nconst SHEETS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx3MR7gDoWDMDcaIjYU2vU_wGcgYcUYipixvKKCsT45fS6_Gxh0v-hpddZhCpCcl3IcdQ/exec';\n\n// Single source of truth for the AI providers the backend supports. Every\n// part of the UI (Settings picker, status badges, result captions) reads\n// from this list so they can never drift apart.\nconst PROVIDERS = [\n  { id: 'claude',   name: 'Claude' },\n  { id: 'openai',   name: 'ChatGPT' },\n  { id: 'gemini',   name: 'Gemini' },\n  { id: 'grok',     name: 'Grok' },\n  { id: 'deepseek', name: 'DeepSeek' },\n];\nconst providerName = (id) => (PROVIDERS.find(p => p.id === id) || { name: 'Claude' }).name;\n\n// Fixed system prompt for AI thumbnail art. The \"Create image\" button on a saved\n// song copies this verbatim, with the song's title + summary + lyrics appended as\n// the [Cover name] input, then opens Gemini so the user can paste and generate.\nconst THUMBNAIL_PROMPT = `You are a world-class visual AI designer specialized in creating high-performing YouTube thumbnails for music content.\n\nYour objective is to create emotionally powerful, visually consistent, and highly clickable thumbnails for song covers, optimized for a 30–50% clickthrough rate (CTR), especially on mobile feeds.\n\nYou will receive user input [Cover name] that contains:\n- A song title (which must appear as the only visible text in the image) = Cover name\n- One of the following:\n  - A brief description of the song's emotional background, OR\n  - The full lyrics of the song\n\n---\n\n🧠 YOUR TASK:\n1. If provided with a background description, analyze the emotional tone and any individuals, places, or situations mentioned.\n2. If provided with lyrics, extract:\n   - The dominant emotion\n   - Any implied setting, situation, or relationship\n   - Visual metaphors or imagery that suggest mood, lighting, weather, environment, or scene.\n3. Visually represent the song using a fitting scene based on its mood, theme, and imagery.\n4. Do not include background context, lyrics, or extra wording as text.\n5. The only text visible in the image should be the song title, stylized according to the fixed banner system.\n6. Adhere 100% to the design system outlined below.\n\n---\n\n🔒 FIXED THUMBNAIL DESIGN SYSTEM (Apply exactly):\n\n• 📐 Image Specs:\n  - 1280x720 pixels (16:9)\n  - Ultra-high resolution, hyper-detailed\n  - Format: JPEG or PNG\n\n• 🎭 Scene:\n  - Create a visually striking scene that strongly matches the tone, theme, and energy of the song title and any additional context provided by the user.\n  - Analyze the song title and description first, then decide the best composition, angle, background, and mood to visually represent the song in a compelling, family-friendly way.\n  - Replace the corny animated character with a fitting visual scene inspired by the song's emotional world.\n  - The scene can include environments, props, silhouettes, symbolic elements, or cinematic moments that communicate the feeling of the song.\n  - Prioritize imagery that feels instantly readable and emotionally strong at thumbnail size.\n  - Use a clean, bold composition with one clear focal point.\n  - Adapt lighting, background, depth, and framing dynamically based on the song (e.g. glowing city for nightlife songs, rainy street for heartbreak, open road for freedom, mountain campsite for adventure, empty room for loneliness, etc.).\n  - The overall image should feel cinematic, dramatic, and highly clickable rather than cartoonish or goofy.\n\n• 🖼️ Visual Style:\n  - Highly polished digital illustration or cinematic thumbnail art\n  - Not crude, childish, or intentionally comedic\n  - Rich detail, strong depth, and professional YouTube-thumbnail appeal\n  - Clear subject separation and visual hierarchy\n  - Avoid clutter; keep the composition focused and bold\n  - Use scene-driven storytelling rather than character-driven comedy\n\n• 💡 Lighting:\n  - High-contrast cinematic with rim lighting from both sides\n  - Neon glow with:\n    - Dominant color: Electric Blue (#00FFFF)\n    - Accent color: Magenta (#FF00FF)\n\n• 🌇 Background:\n  - Golden hour city rooftop with sun flare, glowing skyline, soft bokeh blur\n  - If the song's mood clearly calls for a different environment, replace the rooftop with a more fitting cinematic scene while preserving the same premium thumbnail quality and lighting intensity\n\n• 🏷️ Top Banner Text (Only Text in Image):\n  - Banner: 150px tall, solid black (#000000) with gradient to dark gray (#1a1a1a)\n  - Text: SONG TITLE ONLY, all caps\n    - Font: Bebas Neue or Impact\n    - Color: Bold white with black outline\n    - Alignment: Centered, scaled to fill banner height\n\n• ✨ Additional Effects:\n  - Lens flare (top corners, subtle)\n  - Atmospheric bokeh/dust particles\n  - Soft vignette for visual focus\n  - Sharpened focal area / main scene subject\n\n---\n\n📌 DO NOT:\n- Include lyrics or background description in the image\n- Deviate from the banner design\n- Use a corny animated character as the main subject\n- Use goofy, childish, or crude cartoon imagery\n- Add any text other than the song title\n- Create abstract imagery with no clear scene or focal point`;\n\nconst GEMINI_URL = 'https://gemini.google.com/app';\n\n// The songwriter persona + craft rules + the exact Suno-readable output contract.\n// Prepended to every Songwriter request so the model behaves like a world-class\n// hit writer and returns something the app's parser and Suno both understand.\nconst SONGWRITER_DIRECTIVE = `You are a world-class, award-winning hit songwriter and topliner — the kind who writes #1 singles that millions stream on repeat. Your job is to write ONE complete, original song that could genuinely top the charts.\n\nWHAT MAKES IT WORLD-CLASS (do all of this):\n- A single strong concept and a title that sells it.\n- An instantly memorable, repeatable CHORUS that is the emotional payoff — the part people sing back after one listen.\n- Verses that build tension and set the chorus up with contrast; a pre-chorus that lifts into it.\n- Concrete, sensory, specific images and fresh turns of phrase — never clichés, filler, or vague greeting-card lines.\n- Singable phrasing: consistent meter and syllable counts within each section, natural word stress, and a clear, satisfying rhyme scheme.\n- A real arc across the song: setup → lift → payoff → a turn in the bridge → final send-off.\n- Contemporary, conversational, human language. Every line earns its place.\n\nSUNO-READY OUTPUT CONTRACT (follow EXACTLY — this is non-negotiable):\n- Output ONLY the song. No preamble, no commentary, no explanations, no markdown, no code fences.\n- Line 1 must be: TITLE: <the song title>\n- Line 2 must be: STYLE: <about 10–16 comma-separated descriptors that go straight into Suno's Style box — genre + subgenre, mood, tempo/energy, the lead vocal painted as concrete human sound (see VOCAL REALISM LAYER below), key instrumentation, a production/recording aesthetic that keeps the voice human (e.g. close-mic, vocal-forward mix, raw studio take, minimal pitch correction, natural dynamics), and a short trailing \"avoid …\" clause naming only this song's 3–7 most likely AI vocal tells>. Keep them tag-like, not full sentences.\n- Then the lyrics. Put every section's tag in square brackets on its own line, using Suno's structure tags: [Intro], [Verse 1], [Pre-Chorus], [Chorus], [Verse 2], [Bridge], [Outro]. Include the sections the song needs; a hit almost always repeats the [Chorus].\n- EVERY section tag must also state HOW it is performed, written INSIDE the same brackets after a colon — Suno reads this to voice the section. Format: [Section: vocal cue]. Examples: [Verse 1: male warm tenor, smooth melodic, conversational], [Pre-Chorus: male vocal, raspy edge, building], [Chorus: male & female harmonies, anthemic belt, soaring], [Verse 2: male bright nasal fast rap, crisp diction, aggressive], [Bridge: female breathy alto, half-time, whispered, intimate], [Outro: layered gang vocals, chant]. Do NOT put the vocal cue on a separate line or in its own brackets — it must be inside the section tag; keep it tag-like (comma-separated descriptors, not a sentence) and under ~90 characters.\n- Specify, in each tag, the singer (male / female / duet / choir / gang vocals) and the delivery painted as concrete SOUND so Suno can reproduce the voice, not just a one-word label: its register (deep baritone, warm tenor, bright alto or high soprano), timbre and texture (raspy, nasal, breathy, gravelly, smooth or gritty), diction and accent feel (crisp enunciated, slurred, drawled or laid-back), cadence and phrasing (melodic, belted, falsetto, whispered, spoken, rap, fast rap, triplet flow, behind-the-beat or punchy front-of-beat), and energy (intimate, building, aggressive or anthemic), choosing the few descriptors that most define the voice— all consistent with the lead vocal type on the STYLE line.\n- Write the chorus lyrics out in full every time it recurs — never write \"repeat chorus\" or similar (repeat the [Chorus: ...] tag with its vocal cue each time).\n- Keep the whole lyric tight enough for a ~2–3 minute Suno track: favor impact and repetition over length.\n\nVOCAL REALISM LAYER (make the LEAD VOCAL sound like a real human performance, not an AI — this is the top quality bar):\nHuman realism comes from specific performance detail, never from asking for it. Before writing, silently decide the following and let them drive every vocal cue — state the detail, never the label:\n- WHO is singing: one specific, believable singer. Fix their gender presentation, age impression, register (deep baritone, warm tenor, bright alto, airy soprano; chest voice, head voice or falsetto) and one or two concrete textures — warm, raspy, breathy, smoky, gravelly, fragile, husky, worn, airy, nasal, dry or full. BANNED as vocal words: realistic, professional, amazing, high quality, emotional, beautiful, human, non-AI — they describe nothing Suno can sing.\n- WHAT MOMENT they are in: a real emotional situation that fits the lyrics — alone late at night, trying to stay composed, confessing something long avoided, remembering someone lost, angry but controlled, celebrating while still carrying pain. Paint the STYLE delivery as \"singing as if …\" so the voice performs the moment instead of reading lines.\n- HOW EACH SECTION is performed — sections must NOT share one delivery unless the song is intentionally minimal: verses lean intimate, conversational, restrained, close-mic; pre-choruses lift with rising tension and breath support; choruses release into fuller chest voice, bigger vowels and projection; bridges change texture — more vulnerable, exposed, a turning point; final choruses may add harmonies, ad libs, slight strain or more urgency. Make each [Section: vocal cue] tag reflect its own job — do not repeat one delivery down the whole song.\n- CONTROLLED IMPERFECTIONS: weave 2–4 believable human flaws across the sections — natural breath, slight cracks on emotional words, uneven phrase endings, small timing drift, soft consonants, restrained vibrato, pushed chest voice, imperfect attacks, a tired or slightly breaking tone. Believable, not sloppy — never pile them all on at once, and never make the vocal too perfect.\n- RECORDING CONTEXT: fold genre-appropriate cues into STYLE that cut synthetic gloss — close-mic, dry vocal, raw studio take, live-room feel, vocal-forward mix, minimal pitch correction, natural dynamics, light room reverb, slight tape warmth, sparse arrangement that leaves room for the voice. Match the genre: country ballad -> raw take + sparse acoustic; pop -> vocal-forward + controlled vibrato; rock -> live band + pushed chest voice; R&B -> close-mic breathy + subtle runs; folk -> natural room + understated delivery.\n- AVOID CUES: end the STYLE line with a short \"avoid …\" clause naming only the 3–7 AI failure modes most likely for THIS song — e.g. robotic or vocaloid tone, heavy autotune, glossy AI pop polish, overprocessed lead vocal, exaggerated vibrato, chipmunk tone, fake choir. Keep it short and song-specific; never dump the whole list.\nVOCAL RULES (do not break):\n- Never ask for \"realistic\" or \"human\" vocals directly — realism must come from concrete performance detail.\n- Never use percentages (no \"80% emotion\", no \"30% reverb\").\n- Never contradict the genre — a fragile whisper does not fit arena rock except as a deliberate contrast section.\n- Do not default every song to raw and raspy; choose the texture the song actually needs.\n- Preserve the user's intent — if they asked for polished pop, keep it polished pop and make it more real inside that lane; do not force a raw folk vocal onto it.\n- Do not over-tag or overload — one vocal cue per section is enough, and specific-and-focused always beats long-and-cluttered.\n- Do not bury the lead — when realism matters keep the mix vocal-forward with space around the voice.\n- Never name a real artist to describe the voice — describe the sound only.\nBEFORE YOU FINISH, verify: the singer sounds like a specific person; the verse and chorus deliveries are not identical; the vocal carries controlled imperfections; the recording context supports realism; the avoid clause targets this song's likely AI tells; and no line uses a named artist or the word \"realistic\".`;\n\n// ---- Edit Video: caption styling ----\n// Everything the caption renderer needs is defined here once; the style picker,\n// the live preview canvas, and (in the next step) the video recorder all read\n// from the same lists so they can never disagree.\nconst EV_STYLES = [\n  { id: 'classic',     name: 'Classic' },\n  { id: 'bold',        name: 'Bold' },\n  { id: 'karaoke',     name: 'Karaoke' },\n  { id: 'fade',        name: 'Fade' },\n  { id: 'anthem',      name: 'Anthem' },      // huge all-caps, punches in with a quick scale-up\n  { id: 'handwritten', name: 'Handwritten' }, // soft gentle fade-in, casual look\n  { id: 'neon',        name: 'Neon' },        // glow around the text; words brighten karaoke-style\n];\n// px values are for the full 1280×720 frame; smaller canvases scale down.\nconst EV_SIZES = [\n  { id: 'sm', label: 'Small',       px: 34 },\n  { id: 'md', label: 'Medium',      px: 48 },\n  { id: 'lg', label: 'Large',       px: 64 },\n  { id: 'xl', label: 'Extra Large', px: 84 },\n];\n// System font stacks only — they render on a canvas with no download, so the\n// recorded video can never lose its font offline.\nconst EV_FONTS = [\n  { id: 'clean',      name: 'Clean',      css: 'Arial, Helvetica, sans-serif' },\n  { id: 'impact',     name: 'Impact',     css: 'Impact, \"Arial Black\", sans-serif' },\n  { id: 'rounded',    name: 'Rounded',    css: '\"Comic Sans MS\", \"Trebuchet MS\", sans-serif' },\n  { id: 'typewriter', name: 'Typewriter', css: '\"Courier New\", Courier, monospace' },\n  { id: 'serif',      name: 'Serif',      css: 'Georgia, \"Times New Roman\", serif' },\n];\nconst EV_POSITIONS = [\n  { id: 'top',    label: 'Top' },\n  { id: 'middle', label: 'Middle' },\n  { id: 'bottom', label: 'Bottom' },\n];\nconst EV_SWATCHES = ['#ffffff', '#000000', '#ffe14d', '#ff9f43', '#ff5252', '#ff7ad9', '#b388ff', '#4fa3ff', '#2fd6c3', '#7ddb5a'];\n// Templates: complete pre-designed looks. Applying one sets every styling\n// control at once (style, size, font, colors, position) — after that the\n// manual controls tweak it like any other look. The \"(edited)\" badge is\n// derived by comparing the current settings to the template's look, so it\n// can never get out of sync with what's actually on screen.\nconst EV_TEMPLATES = [\n  { id: 'anthem',      name: 'Anthem',      look: { style: 'anthem',      size: 'xl', color: '#ffffff', bg: '#000000', font: 'impact',  pos: 'middle' } },\n  { id: 'handwritten', name: 'Handwritten', look: { style: 'handwritten', size: 'md', color: '#ffe9cf', bg: '#43324a', font: 'rounded', pos: 'middle' } },\n  { id: 'neon',        name: 'Neon',        look: { style: 'neon',        size: 'lg', color: '#59f7ff', bg: '#0a0a14', font: 'clean',   pos: 'middle' } },\n];\nconst EV_CAPTION_DEFAULTS = { evStyle: 'classic', evSize: 'md', evColor: '#ffffff', evBg: '#000000', evFont: 'clean', evPos: 'middle', evTemplate: '' };\nconst EV_CAPTION_LS_KEY = 'tuneStudio.evCaption';\
